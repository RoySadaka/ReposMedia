mplementations, and state-based eligibility.</li><li>Connectors live in the Skills Registry and implementations live outside the registry.</li><li>Skill exposure is immutable within an interaction and recalculated between interactions.</li><li>Session continuity is reconstructed from persisted session files rather than assumed from warm process state.</li></ol>\n<h2 id=\"rationale-summary\">Rationale summary</h2>\n<p>These decisions keep ownership boundaries explicit, allow multiple workspaces to share the same runtime architecture, and preserve the workspace&#x27;s ability to control state and capabilities without coupling private implementations directly into BetaOne.</p>\n<h2 id=\"tbd-items\"><code>TBD</code> items</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Area</th><th>Current status</th></tr></thead><tbody><tr><td>Latency</td><td><code>TBD</code></td></tr><tr><td>Cost</td><td><code>TBD</code></td></tr><tr><td>Throughput</td><td><code>TBD</code></td></tr><tr><td>Full observability model</td><td><code>TBD</code></td></tr><tr><td>Future memory isolation policy</td><td><code>TBD</code></td></tr></tbody></table></div>\n<h2 id=\"specified-in-this-documentation-baseline\">Specified in this documentation baseline</h2>\n<ul><li>BetaOne interaction-based public API shape</li><li>Connector example structure and file responsibilities</li><li>Ownership split across Firestone, BetaOne, workspaces, and the Skills Registry</li><li>Lifecycle split across pre-flight, BetaOne execution, Gists, and post-flight</li></ul>\n<h2 id=\"approval-asks\">Approval asks</h2>\n<ul><li>approve BetaOne runtime framing and Firestone caller/orchestrator framing</li><li>approve the lifecycle and event pipeline contracts</li><li>approve the workspace integration model and connector boundary</li><li>approve the interaction-scoped eligibility model</li></ul>\n<h2 id=\"immediate-milestones-and-owners\">Immediate milestones and owners</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Milestone</th><th>Owner</th></tr></thead><tbody><tr><td>Baseline architecture approval</td><td>Toluna Eng / Architecture</td></tr><tr><td>Runtime contract hardening</td><td>BetaOne implementation owners</td></tr><tr><td>Workspace connector alignment</td><td>Workspace owners</td></tr><tr><td>Phase 1 Gists metadata cleanup</td><td>Shared platform owners</td></tr></tbody></table></div>\n<aside class=\"callout callout-note\"><div class=\"callout-title\">No dedicated risk slide in v1</div><div class=\"callout-body\"><p>Risk framing can be added later, but this baseline version keeps the focus on architecture approval, interface contracts, and immediate next milestones.</p></div></aside>", "searchText": "Architecture Decisions Baseline decisions to approve now, plus the immediate milestones and open follow-ups for the current BetaOne runtime architecture. Baseline decisions to approve BetaOne is a standalone runtime, not only a Firestone-internal component. Firestone is the main current lifecycle orchestrator above BetaOne. BetaOne owns runtime assembly, Codex execution, skill invocation, Gists streaming, and session reconstruction. Workspaces own SOUL.md , automata/state, hidden implementations, and state-based eligibility. Connectors live in the Skills Registry and implementations live outside the registry. Skill exposure is immutable within an interaction and recalculated between interactions. Session continuity is reconstructed from persisted session files rather than assumed from warm process state. Rationale summary These decisions keep ownership boundaries explicit, allow multiple workspaces to share the same runtime architecture, and preserve the workspace's ability to control state and capabilities without coupling private implementations directly into BetaOne. TBD items Area Current status Latency TBD Cost TBD Throughput TBD Full observability model TBD Future memory isolation policy TBD Specified in this documentation baseline BetaOne interaction-based public AP   <script>

const state = {
  pagesBySlug: new Map(DOCS_DATA.pages.map((page) => [page.slug, page])),
  currentPage: null,
};

const pageRoot = document.getElementById("page-root");
const leftNav = document.getElementById("left-nav");
const pageToc = document.getElementById("page-toc");
const topTabs = document.getElementById("top-tabs");
const searchInput = document.getElementById("site-search");
const searchResults = document.getElementById("search-results");

function groupedPagesForTab(tabId) {
  const groups = DOCS_DATA.site.groups.filter((group) => group.tab === tabId);
  return groups.map((group) => ({
    ...group,
    pages: DOCS_DATA.pages
      .filter((page) => page.tab === tabId && page.group === group.id)
      .sort((a, b) => a.order - b.order || a.title.localeCompare(b.title)),
  })).filter((group) => group.pages.length);
}

function firstPageForTab(tabId) {
  const pages = DOCS_DATA.pages
    .filter((page) => page.tab === tabId)
    .sort((a, b) => a.order - b.order || a.title.localeCompare(b.title));
  return pages[0] || null;
}

function parseRoute() {
  const raw = window.location.hash.replace(/^#/, "");
  if (!raw) {
    return { slug: DOCS_DATA.site.defaultPage, section: "" };
  }
  const [pathPart, queryPart] = raw.split("?");
  const slug = pathPart.replace(/^\//, "") || DOCS_DATA.site.defaultPage;
  const params = new URLSearchParams(queryPart || "");
  return { slug, section: params.get("section") || "" };
}

function setRoute(slug, section = "") {
  const params = new URLSearchParams();
  if (section) params.set("section", section);
  const suffix = params.toString() ? `?${params.toString()}` : "";
  const nextHash = `#/${slug}${suffix}`;
  if (window.location.hash === nextHash) {
    render();
  } else {
    window.location.hash = nextHash;
  }
}

function renderTopTabs(activeTab) {
  topTabs.innerHTML = "";
  DOCS_DATA.site.tabs.forEach((tab) => {
    const page = firstPageForTab(tab.id);
    if (!page) return;
    const link = document.createElement("a");
    link.href = `#/${page.slug}`;
    link.className = `top-tab${tab.id === activeTab ? " active" : ""}`;
    link.textContent = tab.label;
    topTabs.appendChild(link);
  });
}

function renderLeftNav(activePage) {
  const groups = groupedPagesForTab(activePage.tab);
  leftNav.innerHTML = groups.map((group) => `
    <section class="nav-group">
      <div class="nav-group-label">${escapeHtml(group.label)}</div>
      ${group.pages.map((page) => `
        <a class="nav-link${page.slug === activePage.slug ? " active" : ""}" href="#/${page.slug}">
          <span>${escapeHtml(page.title)}</span>
          <span class="nav-link-summary">${escapeHtml(page.summary)}</span>
        </a>
      `).join("")}
    </section>
  `).join("");
}

function renderPage(page) {
  state.currentPage = page;
  const hero = renderHero(page);
  pageRoot.innerHTML = `
    <div class="page-shell">
      ${hero}
      <div class="page-body">${page.html}</div>
    </div>
  `;
  wireCopyButtons();
  renderToc(page);
  rerouteInternalLinks();
}

function renderHero(page) {
  const hero = page.hero || {
    kicker: DOCS_DATA.site.title,
    headline: page.title,
    lede: page.summary,
  };
  const heroClass = page.slug === "home" ? "page-hero page-hero-home" : "page-hero";
  const titleMark = page.slug === "home" ? '<span class="title-mark" aria-hidden="true">🅱️1️⃣</span>' : "";
  const meta = [];
  if (page.status) meta.push(`<span class="meta-badge">${escapeHtml(page.status)}</span>`);
  if (page.audience) meta.push(`<span class="meta-badge">${escapeHtml(page.audience)}</span>`);
  const knight = page.slug === "home" && DOCS_DATA.assets["chess-knight"]
    ? `<img class="hero-knight-mark" src="${DOCS_DATA.assets["chess-knight"]}" alt="" aria-hidden="true" />`
    : "";
  const lineage = page.slug === "home" ? `
      <div class="lineage-row">
        <span class="lineage-badge">♘ BetaOne / Gambit lineage</span>
        <span class="lineage-copy">Named in the AlphaZero spirit, alongside Toluna's broader Gambit AI naming line.</span>
      </div>
    ` : "";
  return `
    <header class="${heroClass}">
      ${knight}
      <div class="summary-pill">${escapeHtml(hero.kicker || DOCS_DATA.site.title)}</div>
      <h1 class="page-title">${escapeHtml(hero.headline || page.title)}${titleMark}</h1>
      <div class="page-lede">${escapeHtml(hero.lede || page.summary)}</div>
      <div class="meta-row">${meta.join("")}</div>
      ${lineage}
      ${renderCards(page.cards || [])}
    </header>
  `;
}

function renderCards(cards) {
  if (!cards.length) return "";
  return `
    <div class="card-grid">
      ${cards.map((card) => `
        <a class="hero-card" href="${escapeHtml(card.href)}">
          <span class="hero-card-eyebrow">${escapeHtml(card.eyebrow || "")}</span>
          <span class="hero-card-title">${escapeHtml(card.title)}</span>
          <span class="hero-card-description">${escapeHtml(card.description)}</span>
        </a>
      `).join("")}
    </div>
  `;
}

function renderToc(page) {
  const headings = Array.from(pageRoot.querySelectorAll(".page-body h2, .page-body h3"));
  if (!headings.length) {
    pageToc.innerHTML = '<div class="empty-toc">No headings on this page.</div>';
    return;
  }
  pageToc.innerHTML = headings.map((heading) => `
    <a class="toc-link level-${heading.tagName.toLowerCase().slice(1)}" href="#/${page.slug}?section=${encodeURIComponent(heading.id)}">
      ${escapeHtml(heading.textContent || "")}
    </a>
  `).join("");
  syncActiveHeading();
}

function syncActiveHeading() {
  const tocLinks = Array.from(pageToc.querySelectorAll(".toc-link"));
  const headings = Array.from(pageRoot.querySelectorAll(".page-body h2, .page-body h3"));
  if (!tocLinks.length || !headings.length) return;
  const observer = new IntersectionObserver((entries) => {
    const visible = entries
      .filter((entry) => entry.isIntersecting)
      .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
    if (!visible) return;
    const id = visible.target.id;
    tocLinks.forEach((link) => {
      const active = decodeURIComponent(link.href.split("section=")[1] || "") === id;
      link.classList.toggle("active", active);
    });
  }, { rootMargin: "-25% 0px -55% 0px", threshold: [0.2, 0.6] });
  headings.forEach((heading) => observer.observe(heading));
}

function rerouteInternalLinks() {
  Array.from(pageRoot.querySelectorAll('a[href^="#/"]')).forEach((link) => {
    link.addEventListener("click", () => {
      searchResults.hidden = true;
    });
  });
}

function wireCopyButtons() {
  Array.from(pageRoot.querySelectorAll(".copy-button")).forEach((button) => {
    button.addEventListener("click", async () => {
      const code = button.closest(".code-shell")?.querySelector("code");
      if (!code) return;
      await navigator.clipboard.writeText(code.innerText);
      const original = button.textContent;
      button.textContent = "Copied";
      setTimeout(() => { button.textContent = original; }, 1200);
    });
  });
}

function runSearch(query) {
  const normalized = query.trim().toLowerCase();
  if (!normalized) {
    searchResults.hidden = true;
    searchResults.innerHTML = "";
    return;
  }
  const terms = normalized.split(/\s+/);
  const matches = DOCS_DATA.pages
    .map((page) => {
      const haystack = page.searchText.toLowerCase();
      const score = terms.reduce((acc, term) => acc + (haystack.includes(term) ? 1 : 0), 0);
      return { page, score };
    })
    .filter((item) => item.score > 0)
    .sort((a, b) => b.score - a.score || a.page.title.localeCompare(b.page.title))
    .slice(0, 8);
  searchResults.innerHTML = matches.length ? matches.map(({ page }) => `
    <a class="search-result" href="#/${page.slug}">
      <span class="search-result-kicker">${escapeHtml(labelForTab(page.tab))}</span>
      <span class="search-result-title">${escapeHtml(page.title)}</span>
      <span class="search-result-summary">${escapeHtml(page.summary)}</span>
    </a>
  `).join("") : '<div class="search-result"><span class="search-result-title">No results</span><span class="search-result-summary">Try a component name, event, or contract term.</span></div>';
  searchResults.hidden = false;
}

function labelForTab(tabId) {
  const tab = DOCS_DATA.site.tabs.find((entry) => entry.id === tabId);
  return tab ? tab.label : tabId;
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function render() {
  const route = parseRoute();
  const page = state.pagesBySlug.get(route.slug) || state.pagesBySlug.get(DOCS_DATA.site.defaultPage);
  if (!page) return;
  renderTopTabs(page.tab);
  renderLeftNav(page);
  renderPage(page);
  if (route.section) {
    const target = document.getElementById(route.section);
    if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
  } else {
    window.scrollTo({ top: 0, left: 0 });
  }
}

window.addEventListener("hashchange", render);
searchInput.addEventListener("input", (event) => runSearch(event.target.value));
searchInput.addEventListener("focus", (event) => runSearch(event.target.value));
document.addEventListener("click", (event) => {
  if (!searchResults.contains(event.target) && event.target !== searchInput) {
    searchResults.hidden = true;
  }
});

render();

  </script>
</body>
</html>
