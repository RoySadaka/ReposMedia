<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BetaOne</title>
  <style>

:root {
  --bg: #06070a;
  --panel: rgba(12, 13, 19, 0.92);
  --panel-2: rgba(18, 20, 28, 0.88);
  --panel-3: rgba(24, 27, 38, 0.8);
  --border: rgba(255, 255, 255, 0.08);
  --text: #f2eee7;
  --muted: #b0a79d;
  --accent: #42d7ff;
  --accent-soft: rgba(66, 215, 255, 0.16);
  --success: #7be8d1;
  --warning: #ffe28f;
  --danger: #ff9fb9;
  --shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
  --radius: 22px;
  --radius-sm: 14px;
  --content-width: 860px;
  font-family: "Avenir Next", "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background:
    radial-gradient(circle at top left, rgba(66, 215, 255, 0.14), transparent 32%),
    radial-gradient(circle at top right, rgba(90, 120, 255, 0.1), transparent 28%),
    linear-gradient(180deg, #090a0f 0%, #05060a 100%);
  color: var(--text);
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 85%);
  pointer-events: none;
}

a {
  color: #c9f7ff;
  text-decoration: none;
}

a:hover {
  color: #ffffff;
}

code, pre, .brand-tagline, .summary-pill, .nav-group-label, .toc-label, .code-meta, .search-result-kicker {
  font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
}

.app-shell {
  position: relative;
  z-index: 1;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: grid;
  grid-template-columns: 280px minmax(280px, 1fr) auto;
  align-items: center;
  gap: 20px;
  padding: 18px 26px 16px;
  backdrop-filter: blur(18px);
  background: rgba(4, 5, 8, 0.84);
  border-bottom: 1px solid var(--border);
}

.brand-lockup {
  display: flex;
  align-items: center;
  gap: 14px;
  color: var(--text);
  text-decoration: none;
  transition: 180ms ease;
}

.brand-lockup:hover {
  color: #ffffff;
}

.brand-lockup:hover .brand-mark {
  filter: drop-shadow(0 10px 22px rgba(66, 215, 255, 0.24));
}

.brand-mark {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.55rem;
  line-height: 1;
  filter: drop-shadow(0 8px 18px rgba(66, 215, 255, 0.16));
}

.brand-name {
  font-size: 1.08rem;
  font-weight: 700;
}

.brand-tagline {
  margin-top: 2px;
  font-size: 0.72rem;
  color: var(--muted);
}

.top-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.top-tab {
  padding: 10px 13px;
  border-radius: 999px;
  border: 1px solid transparent;
  color: var(--muted);
  transition: 180ms ease;
}

.top-tab:hover,
.top-tab.active {
  color: var(--text);
  border-color: rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.04);
}

.search-shell {
  position: relative;
}

.search-shell input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  outline: none;
}

.search-shell input:focus {
  border-color: rgba(66, 215, 255, 0.55);
  box-shadow: 0 0 0 4px rgba(66, 215, 255, 0.12);
}

.search-results {
  position: absolute;
  top: calc(100% + 10px);
  left: 0;
  right: 0;
  background: rgba(10, 12, 17, 0.98);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 10px;
  max-height: 420px;
  overflow: auto;
}

.search-result {
  display: block;
  padding: 12px 14px;
  border-radius: 14px;
}

.search-result:hover {
  background: rgba(255, 255, 255, 0.05);
}

.search-result-title {
  display: block;
  font-weight: 700;
  margin-bottom: 4px;
}

.search-result-kicker {
  display: block;
  color: var(--accent);
  font-size: 0.72rem;
  margin-bottom: 4px;
}

.search-result-summary {
  color: var(--muted);
  font-size: 0.92rem;
}

.layout {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr) 250px;
  gap: 24px;
  padding: 24px 24px 56px;
}

.sidebar,
.toc-card {
  position: sticky;
  top: 98px;
  align-self: start;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.sidebar {
  padding: 18px;
  max-height: calc(100vh - 122px);
  overflow: auto;
  overscroll-behavior: contain;
}

.toc-card {
  padding: 18px;
  max-height: calc(100vh - 122px);
  overflow: auto;
  overscroll-behavior: contain;
}

.content-panel {
  min-width: 0;
}

#page-root {
  max-width: var(--content-width);
  margin: 0 auto;
}

.page-shell {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 28px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

.page-hero {
  position: relative;
  padding: 34px 34px 22px;
  border-bottom: 1px solid var(--border);
  background:
    linear-gradient(135deg, rgba(66, 215, 255, 0.12), transparent 42%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent);
}

.page-hero > * {
  position: relative;
  z-index: 1;
}

.hero-knight-mark {
  position: absolute;
  right: -60px;
  top: 10px;
  width: clamp(180px, 25vw, 320px);
  height: auto;
  opacity: 0.4;
  filter:
    drop-shadow(0 0 6px rgba(255, 208, 92, 0.44))
    drop-shadow(0 0 12px rgba(255, 208, 92, 0.2))
    drop-shadow(0 0 4px rgba(66, 215, 255, 0.12));
  transform: rotate(-5deg);
  pointer-events: none;
  z-index: 0;
}

.summary-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 999px;
  border: 1px solid rgba(66, 215, 255, 0.24);
  color: #c9f7ff;
  background: var(--accent-soft);
  font-size: 0.73rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.page-title {
  font-size: clamp(2.6rem, 5vw, 4.5rem);
  line-height: 0.96;
  margin: 18px 0 14px;
  letter-spacing: -0.05em;
}

.title-mark {
  display: inline-flex;
  align-items: baseline;
  margin-left: 0.08em;
  font-size: 0.92em;
  line-height: 0.92;
  vertical-align: baseline;
  transform: translateY(0.04em);
  filter: drop-shadow(0 8px 18px rgba(66, 215, 255, 0.14));
}

.page-lede,
.page-summary {
  max-width: 720px;
  color: #ddd2c7;
  font-size: 1.08rem;
  line-height: 1.75;
}

.meta-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 18px;
}

.lineage-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
  margin-top: 18px;
}

.meta-badge {
  padding: 8px 11px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.05);
  color: var(--muted);
  font-size: 0.86rem;
}

.lineage-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid rgba(66, 215, 255, 0.2);
  background: rgba(66, 215, 255, 0.08);
  color: #d7f8ff;
  font-size: 0.84rem;
  white-space: nowrap;
}

.lineage-copy {
  color: var(--muted);
  font-size: 0.95rem;
  line-height: 1.6;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-top: 26px;
}

.hero-card {
  display: block;
  padding: 18px;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(8, 10, 15, 0.76);
  transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
}

.hero-card:hover {
  transform: translateY(-2px);
  border-color: rgba(66, 215, 255, 0.35);
  background: rgba(12, 14, 20, 0.92);
}

.hero-card-eyebrow {
  color: var(--accent);
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.hero-card-title {
  display: block;
  margin-top: 12px;
  font-weight: 700;
  font-size: 1.1rem;
}

.hero-card-description {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  line-height: 1.6;
}

.page-body {
  padding: 30px 34px 38px;
}

.page-body h2,
.page-body h3,
.page-body h4 {
  scroll-margin-top: 110px;
}

.page-body h2 {
  margin-top: 42px;
  margin-bottom: 14px;
  font-size: 1.7rem;
}

.page-body h3 {
  margin-top: 28px;
  margin-bottom: 10px;
  font-size: 1.16rem;
}

.page-body p,
.page-body li,
.page-body td,
.page-body th,
.page-body blockquote {
  color: #d7cec4;
  line-height: 1.78;
  font-size: 1rem;
}

.page-body ul,
.page-body ol {
  padding-left: 24px;
}

.page-body blockquote {
  margin: 18px 0;
  padding: 12px 18px;
  border-left: 3px solid rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.03);
  border-radius: 0 14px 14px 0;
}

.callout {
  margin: 22px 0;
  padding: 18px 18px 16px;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.03);
}

.callout-title {
  font-weight: 700;
  margin-bottom: 10px;
}

.callout-note {
  border-color: rgba(119, 216, 162, 0.18);
  background: rgba(119, 216, 162, 0.08);
}

.callout-warning {
  border-color: rgba(255, 211, 139, 0.2);
  background: rgba(255, 211, 139, 0.08);
}

.callout-contract {
  border-color: rgba(66, 215, 255, 0.22);
  background: rgba(66, 215, 255, 0.08);
}

.details-block {
  margin: 20px 0;
  border: 1px solid var(--border);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.03);
  overflow: hidden;
}

.details-block summary {
  cursor: pointer;
  padding: 16px 18px;
  font-weight: 700;
}

.details-body {
  padding: 0 18px 16px;
}

.table-shell,
.diagram-shell,
.code-shell,
.image-shell {
  margin: 22px 0;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--panel-2);
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th,
td {
  padding: 14px 16px;
  vertical-align: top;
  text-align: left;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}

th {
  color: #ecfbff;
  background: rgba(255, 255, 255, 0.03);
}

.diagram-shell {
  padding: 18px;
}

.diagram-shell svg {
  display: block;
  width: 100%;
  height: auto;
}

.image-shell img {
  display: block;
  width: 100%;
  height: auto;
}

.image-shell figcaption {
  padding: 12px 16px 16px;
  color: var(--muted);
  font-size: 0.9rem;
}

.code-shell {
  position: relative;
}

.code-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 10px 14px 10px 16px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}

.code-meta {
  color: var(--muted);
  font-size: 0.76rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  min-width: 0;
}

.copy-button {
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text);
  border-radius: 999px;
  padding: 6px 10px;
  cursor: pointer;
  flex-shrink: 0;
}

pre {
  margin: 0;
  padding: 18px;
  overflow: auto;
  color: #f3ebe2;
}

.nav-group {
  margin-bottom: 18px;
}

.nav-group-label {
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.72rem;
  margin-bottom: 10px;
}

.nav-link {
  display: block;
  padding: 10px 12px;
  border-radius: 12px;
  color: #d7cec4;
}

.nav-link:hover,
.nav-link.active {
  background: var(--accent-soft);
  color: #ecfbff;
}

.nav-link-summary {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: 0.83rem;
  line-height: 1.4;
}

.toc-label {
  color: var(--muted);
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.72rem;
}

.toc-link {
  display: block;
  padding: 6px 0;
  color: var(--muted);
  font-size: 0.92rem;
}

.toc-link.level-3 {
  padding-left: 12px;
}

.toc-link.active {
  color: #ecfbff;
}

.empty-toc {
  color: var(--muted);
  font-size: 0.92rem;
}

@media (max-width: 1180px) {
  .layout {
    grid-template-columns: 260px minmax(0, 1fr);
  }

  .toc-rail {
    display: none;
  }
}

@media (max-width: 900px) {
  .topbar {
    grid-template-columns: 1fr;
  }

  .layout {
    grid-template-columns: 1fr;
  }

  .sidebar,
  .toc-card {
    position: static;
  }

  .page-hero,
  .page-body {
    padding-left: 20px;
    padding-right: 20px;
  }

  .hero-knight-mark {
    width: min(42vw, 190px);
    right: -30px;
    top: 12px;
    opacity: 0.32;
  }
}

  </style>

  <script>
const DOCS_DATA = {"site": {"title": "BetaOne", "tagline": "Agentic runtime for conversational AI products", "defaultPage": "home", "tabs": [{"id": "get-started", "label": "Get Started", "order": 10}, {"id": "architecture", "label": "Architecture", "order": 20}, {"id": "integration", "label": "Integration", "order": 30}, {"id": "reference", "label": "Reference", "order": 40}], "groups": [{"id": "baseline", "tab": "architecture", "label": "Baseline", "order": 10}, {"id": "runtime", "tab": "architecture", "label": "Runtime", "order": 20}, {"id": "overview", "tab": "get-started", "label": "Overview", "order": 10}, {"id": "guide", "tab": "get-started", "label": "First Steps", "order": 20}, {"id": "workspaces", "tab": "integration", "label": "Workspaces", "order": 10}, {"id": "connectors", "tab": "integration", "label": "Connectors", "order": 20}, {"id": "contracts", "tab": "reference", "label": "Contracts", "order": 10}, {"id": "memory", "tab": "reference", "label": "Memory", "order": 20}, {"id": "vocabulary", "tab": "reference", "label": "Vocabulary", "order": 30}, {"id": "decisions", "tab": "reference", "label": "Decisions", "order": 40}]}, "pages": [{"id": "home", "title": "Home", "slug": "home", "tab": "get-started", "group": "overview", "order": 10, "summary": "Architecture-first entry point for BetaOne as a standalone agentic runtime, plus the fastest path into lifecycle, API, POD, and connector concepts.", "audience": "Toluna Engineering and Architecture", "status": "Release 1", "hero": {"kicker": "Home", "headline": "BetaOne", "lede": "The offline handbook for the standalone runtime that uses Codex to plan, think, and execute conversational AI interactions across workspaces."}, "cards": [{"eyebrow": "Architecture", "title": "System Map", "description": "Start with BetaOne as the runtime engine, Firestone as the main current orchestrator, and workspaces as capability owners.", "href": "#/system-map"}, {"eyebrow": "Runtime", "title": "Conversation Lifecycle", "description": "Trace pre-flight, BetaOne execution, Gists streaming, and post-flight end to end.", "href": "#/conversation-lifecycle"}, {"eyebrow": "Reference", "title": "Prompt-On-Demand (POD)", "description": "See how BetaOne exposes direct LLM access for workspace developers without vendor keys or SDK complexity.", "href": "#/prompt-on-demand"}, {"eyebrow": "Connectors", "title": "Connector Example", "description": "Open a toy skill connector folder with example files, Gists metadata, and HTTP contract.", "href": "#/connector-example"}, {"eyebrow": "Integration", "title": "Workspace Model", "description": "Understand what a workspace owns: SOUL.md, state, eligibility, and skill implementations.", "href": "#/workspace-model"}, {"eyebrow": "Memory", "title": "User and Memory Files", "description": "See how SOUL.md, USER.md, and MEMORY.md shape continuity, personalization, and async memory updates.", "href": "#/user-and-memory-files"}], "html": "<h2 id=\"what-is-betaone\">What is BetaOne?</h2>\n<p>BetaOne is a standalone agentic runtime for conversational AI products. It uses Codex as its thinking, planning, and execution engine, reconstructs runtime context on each invocation, exposes only the capabilities that are eligible for that interaction, and returns streamed and final outputs to whatever system is orchestrating the conversation lifecycle.</p>\n<p>BetaOne also exposes Prompt-On-Demand (POD): a direct LLM invocation capability for workspace developers who need centralized access to vendor-backed inference without handling API keys, provider SDK differences, or response parsing on their own.</p>\n<p>Today, Firestone is the main implementation of that orchestration system. Firestone matters because it owns session lifecycle and product-facing orchestration. BetaOne matters because it is the engine that actually thinks, plans, invokes skills, and executes an interaction.</p>\n<aside class=\"callout callout-note\"><div class=\"callout-title\">BetaOne is not &quot;just behind Firestone&quot;</div><div class=\"callout-body\"><p>Firestone is one caller and orchestrator above BetaOne. BetaOne can expose its interface to other systems as well.</p></div></aside>\n<h2 id=\"why-it-exists-now\">Why it exists now</h2>\n<ul><li>Conversational AI products need a real execution engine, not only a lifecycle wrapper.</li><li>Workspaces need to expose capabilities without leaking implementation details directly into Codex.</li><li>Teams need one place to reason about planning, skill exposure, eligibility, session continuity, and streamed progress.</li><li>Teams also need one place to consume LLM vendors safely and consistently when building AI-powered skills.</li></ul>\n<aside class=\"callout callout-note\"><div class=\"callout-title\">Outcomes we are designing for</div><div class=\"callout-body\"><p>Faster integration, reusable connectors, and a controlled lifecycle are the three baseline outcomes across this documentation set.</p></div></aside>\n<h2 id=\"start-here\">Start here</h2>\n<p>If you want the current system story in the shortest path, read in this order:</p>\n<ol><li><a href=\"#/system-map\">System Map</a></li><li><a href=\"#/runtime-pattern\">Runtime Pattern</a></li><li><a href=\"#/conversation-lifecycle\">Conversation Lifecycle</a></li><li><a href=\"#/prompt-on-demand\">Prompt-On-Demand (POD)</a></li><li><a href=\"#/skills-and-registry\">Skills and Registry</a></li><li><a href=\"#/betaone-api\">BetaOne API</a></li></ol>\n<p>If you are building an integration, jump to:</p>\n<ul><li><a href=\"#/workspace-model\">Workspace Model</a></li><li><a href=\"#/building-a-skill\">Building a Skill</a></li><li><a href=\"#/connector-example\">Connector Example</a></li><li><a href=\"#/event-and-invocation-contracts\">Event and Invocation Contracts</a></li><li><a href=\"#/prompt-on-demand\">Prompt-On-Demand (POD)</a></li></ul>\n<h2 id=\"what-this-docs-set-covers\">What this docs set covers</h2>\n<ul><li>BetaOne as a standalone runtime</li><li>Firestone as the main current lifecycle orchestrator above BetaOne</li><li>Workspace model, skill implementations, and connector registry</li><li>Interaction-level API design, POD, and contract baselines</li><li>Session continuity through <code>SOUL.md</code>, <code>USER.md</code>, <code>MEMORY.md</code>, and persisted session files</li></ul>\n<h2 id=\"the-core-mental-model\">The core mental model</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Layer</th><th>Role</th></tr></thead><tbody><tr><td>Firestone</td><td>Conversation lifecycle orchestration and product integration</td></tr><tr><td>BetaOne</td><td>Agentic execution runtime built on Codex plus centralized direct LLM access through POD</td></tr><tr><td>Workspace</td><td>Domain project that owns identity, state, and skill implementations</td></tr><tr><td>Skills Registry</td><td>Connector layer that tells Codex what capabilities exist and how to call them</td></tr></tbody></table></div>\n<h2 id=\"what-makes-betaone-different\">What makes BetaOne different</h2>\n<h3 id=\"betaone-is-codex-for-conversational-products\">BetaOne is Codex for conversational products</h3>\n<p>The useful analogy is that BetaOne is &quot;Codex, but for conversational AI products&quot;. It prepares the environment, injects the right files and connectors, runs the reasoning/execution engine, and preserves continuity between interactions.</p>\n<h3 id=\"connectors-are-not-implementations\">Connectors are not implementations</h3>\n<p>The registry contains what Codex sees. The workspace still owns the actual implementation behind HTTP endpoints.</p>\n<h3 id=\"pod-is-not-the-codex-runtime\">POD is not the Codex runtime</h3>\n<p>POD is BetaOne&#x27;s direct model-inference utility surface. It is there for workspace developers and skill authors who need to run prompts against LLM vendors without going through the full Codex session/runtime path.</p>\n<h3 id=\"eligibility-is-interaction-scoped\">Eligibility is interaction-scoped</h3>\n<p>Codex is aware of all workspace connectors from session start, but BetaOne constrains each interaction to the eligible sub-list that the workspace reports for that specific moment.</p>\n<h2 id=\"what-is-intentionally-evolving\">What is intentionally evolving</h2>\n<details class=\"details-block\"><summary>Open areas</summary><div class=\"details-body\"><p>The exact BetaOne JSON API, connector file format, and some operational policies are still being finalized. These docs should distinguish current truth from proposed baseline clearly rather than pretending every field is already fixed.</p></div></details>", "searchText": "Home Architecture-first entry point for BetaOne as a standalone agentic runtime, plus the fastest path into lifecycle, API, POD, and connector concepts. What is BetaOne? BetaOne is a standalone agentic runtime for conversational AI products. It uses Codex as its thinking, planning, and execution engine, reconstructs runtime context on each invocation, exposes only the capabilities that are eligible for that interaction, and returns streamed and final outputs to whatever system is orchestrating the conversation lifecycle. BetaOne also exposes Prompt-On-Demand (POD): a direct LLM invocation capability for workspace developers who need centralized access to vendor-backed inference without handling API keys, provider SDK differences, or response parsing on their own. Today, Firestone is the main implementation of that orchestration system. Firestone matters because it owns session lifecycle and product-facing orchestration. BetaOne matters because it is the engine that actually thinks, plans, invokes skills, and executes an interaction. BetaOne is not \"just behind Firestone\" Firestone is one caller and orchestrator above BetaOne. BetaOne can expose its interface to other systems as well. Why it exists now Conversational AI products need a real execution engine, not only a lifecycle wrapper. Workspaces need to expose capabilities without leaking implementation details directly into Codex. Teams need one place to reason about planning, skill exposure, eligibility, session continuity, and streamed progress. Teams also need one place to consume LLM vendors safely and consistently when building AI-powered skills. Outcomes we are designing for Faster integration, reusable connectors, and a controlled lifecycle are the three baseline outcomes across this documentation set. Start here If you want the current system story in the shortest path, read in this order: System Map Runtime Pattern Conversation Lifecycle Prompt-On-Demand (POD) Skills and Registry BetaOne API If you are building an integration, jump to: Workspace Model Building a Skill Connector Example Event and Invocation Contracts Prompt-On-Demand (POD) What this docs set covers BetaOne as a standalone runtime Firestone as the main current lifecycle orchestrator above BetaOne Workspace model, skill implementations, and connector registry Interaction-level API design, POD, and contract baselines Session continuity through SOUL.md , USER.md , MEMORY.md , and persisted session files The core mental model Layer Role Firestone Conversation lifecycle orchestration and product integration BetaOne Agentic execution runtime built on Codex plus centralized direct LLM access through POD Workspace Domain project that owns identity, state, and skill implementations Skills Registry Connector layer that tells Codex what capabilities exist and how to call them What makes BetaOne different BetaOne is Codex for conversational products The useful analogy is that BetaOne is \"Codex, but for conversational AI products\". It prepares the environment, injects the right files and connectors, runs the reasoning/execution engine, and preserves continuity between interactions. Connectors are not implementations The registry contains what Codex sees. The workspace still owns the actual implementation behind HTTP endpoints. POD is not the Codex runtime POD is BetaOne's direct model-inference utility surface. It is there for workspace developers and skill authors who need to run prompts against LLM vendors without going through the full Codex session/runtime path. Eligibility is interaction-scoped Codex is aware of all workspace connectors from session start, but BetaOne constrains each interaction to the eligible sub-list that the workspace reports for that specific moment. What is intentionally evolving Open areas The exact BetaOne JSON API, connector file format, and some operational policies are still being finalized. These docs should distinguish current truth from proposed baseline clearly rather than pretending every field is already fixed."}, {"id": "reading-guide", "title": "Reading Guide", "slug": "reading-guide", "tab": "get-started", "group": "guide", "order": 20, "summary": "How to read this documentation set, what is current truth versus proposed baseline, and where to look based on your role.", "audience": "Toluna Engineering and Architecture", "status": "Release 1", "hero": null, "cards": [], "html": "<h2 id=\"document-intent\">Document intent</h2>\n<p>This is a working runtime handbook, not a polished external marketing site. Some pages describe current truth. Other pages intentionally propose the shape of a still-forming API or connector model. The goal is to keep those two cases explicit.</p>\n<h2 id=\"what-is-considered-current\">What is considered current</h2>\n<ul><li>BetaOne is a standalone runtime, not only a Firestone-internal component</li><li>Firestone is the main current lifecycle orchestrator above BetaOne</li><li>Pre-flight and post-flight belong to the caller/workspace orchestration path, while mid-flight execution and Gists streaming belong to BetaOne</li><li>Workspaces own <code>SOUL.md</code>, define the automata/state-machine, and implement the skills</li><li>The Skills Registry contains connectors, not implementations</li><li>BetaOne&#x27;s Codex sees all workspace skill-connectors at session start and is limited per interaction&#x27;s state by eligible sub-lists of skills</li></ul>\n<h2 id=\"what-is-documented-here-as-baseline\">What is documented here as baseline</h2>\n<ul><li>BetaOne public JSON API shape</li><li>Connector file format and example structure</li><li>Lifecycle ownership and interaction model</li><li>Memory-file ownership and update model</li></ul>\n<h2 id=\"what-is-still-genuinely-tbd\">What is still genuinely <code>TBD</code></h2>\n<ul><li>Quantitative metrics such as latency, throughput, and cost</li><li>Full observability and runtime policy details</li><li>Future memory isolation policy, if it diverges from the current shared-user model</li></ul>\n<aside class=\"callout callout-warning\"><div class=\"callout-title\">Do not treat qualitative descriptions as measured claims</div><div class=\"callout-body\"><p>Where the architecture implies better speed, reuse, or control, the claim should stay qualitative until internal measurements exist.</p></div></aside>\n<h2 id=\"reading-paths\">Reading paths</h2>\n<h3 id=\"for-architecture-review\">For architecture review</h3>\n<p>Read the <code>Architecture</code> tab front to back, then <a href=\"#/betaone-api\">BetaOne API</a>, then <a href=\"#/architecture-decisions\">Architecture Decisions</a>.</p>\n<h3 id=\"for-workspace-implementers\">For workspace implementers</h3>\n<p>Start with <a href=\"#/workspace-model\">Workspace Model</a>, then <a href=\"#/building-a-skill\">Building a Skill</a>, then <a href=\"#/connector-example\">Connector Example</a>, then <a href=\"#/event-and-invocation-contracts\">Event and Invocation Contracts</a>.</p>\n<h3 id=\"for-connector-and-skill-authors\">For connector and skill authors</h3>\n<p>Start with <a href=\"#/skills-and-registry\">Skills and Registry</a>, then <a href=\"#/connector-example\">Connector Example</a>, then <a href=\"#/contracts-reference\">Contracts Reference</a>.</p>\n<h3 id=\"for-anyone-trying-to-understand-memory-and-continuity\">For anyone trying to understand memory and continuity</h3>\n<p>Read <a href=\"#/state-and-memory\">State and Memory</a> and then <a href=\"#/user-and-memory-files\">User and Memory Files</a>.</p>\n<h2 id=\"content-conventions\">Content conventions</h2>\n<ul><li>Diagrams are conceptual and describe ownership and flow rather than deployment minutiae.</li><li>Interface examples show proposed conceptual payloads, not SDK-specific code.</li><li>Links are designed to work entirely offline from the generated HTML artifact.</li></ul>", "searchText": "Reading Guide How to read this documentation set, what is current truth versus proposed baseline, and where to look based on your role. Document intent This is a working runtime handbook, not a polished external marketing site. Some pages describe current truth. Other pages intentionally propose the shape of a still-forming API or connector model. The goal is to keep those two cases explicit. What is considered current BetaOne is a standalone runtime, not only a Firestone-internal component Firestone is the main current lifecycle orchestrator above BetaOne Pre-flight and post-flight belong to the caller/workspace orchestration path, while mid-flight execution and Gists streaming belong to BetaOne Workspaces own SOUL.md , define the automata/state-machine, and implement the skills The Skills Registry contains connectors, not implementations BetaOne's Codex sees all workspace skill-connectors at session start and is limited per interaction's state by eligible sub-lists of skills What is documented here as baseline BetaOne public JSON API shape Connector file format and example structure Lifecycle ownership and interaction model Memory-file ownership and update model What is still genuinely TBD Quantitative metrics such as latency, throughput, and cost Full observability and runtime policy details Future memory isolation policy, if it diverges from the current shared-user model Do not treat qualitative descriptions as measured claims Where the architecture implies better speed, reuse, or control, the claim should stay qualitative until internal measurements exist. Reading paths For architecture review Read the Architecture tab front to back, then BetaOne API , then Architecture Decisions . For workspace implementers Start with Workspace Model , then Building a Skill , then Connector Example , then Event and Invocation Contracts . For connector and skill authors Start with Skills and Registry , then Connector Example , then Contracts Reference . For anyone trying to understand memory and continuity Read State and Memory and then User and Memory Files . Content conventions Diagrams are conceptual and describe ownership and flow rather than deployment minutiae. Interface examples show proposed conceptual payloads, not SDK-specific code. Links are designed to work entirely offline from the generated HTML artifact."}, {"id": "system-map", "title": "System Map", "slug": "system-map", "tab": "architecture", "group": "baseline", "order": 10, "summary": "High-level component model for BetaOne as a standalone runtime, including both the Codex execution path and POD as centralized LLM access for workspace developers.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"component-zoom-out\">Component zoom-out</h2>\n<div class=\"diagram-shell\"><svg id=\"diagram-231412582117\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width: 1062.5625px;\" viewBox=\"-8 -8 1062.5625 429.5\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#diagram-231412582117{font-family:\"trebuchet ms\",verdana,arial,sans-serif;font-size:16px;fill:#ccc;}#diagram-231412582117 .error-icon{fill:#a44141;}#diagram-231412582117 .error-text{fill:#ddd;stroke:#ddd;}#diagram-231412582117 .edge-thickness-normal{stroke-width:2px;}#diagram-231412582117 .edge-thickness-thick{stroke-width:3.5px;}#diagram-231412582117 .edge-pattern-solid{stroke-dasharray:0;}#diagram-231412582117 .edge-pattern-dashed{str ss=\"label\" transform=\"translate(0, 0)\"><foreignObject width=\"0\" height=\"0\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"edgeLabel\"></span></div></foreignObject></g></g></g><g class=\"nodes\"><g class=\"node default default flowchart-label\" id=\"flowchart-Caller-0\" data-node=\"true\" data-id=\"Caller\" transform=\"translate(127.3515625, 181)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-127.3515625\" y=\"-26.5\" width=\"254.703125\" height=\"53\"></rect><g class=\"label\" style=\"\" transform=\"translate(-119.8515625, -19)\"><rect></rect><foreignObject width=\"239.703125\" height=\"38\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Caller / Orchestrator<br/>Firestone is the main current one</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-BetaOne-1\" data-node=\"true\" data-id=\"BetaOne\" transform=\"translate(369.2890625, 181)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-64.5859375\" y=\"-26.5\" width=\"129.171875\" height=\"53\"></rect><g class=\"label\" style=\"\" transform=\"translate(-57.0859375, -19)\"><rect></rect><foreignObject width=\"114.171875\" height=\"38\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">BetaOne<br/>agentic runtime</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-Registry-3\" data-node=\"true\" data-id=\"Registry\" transform=\"translate(615.8046875, 26.5)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-95.6796875\" y=\"-26.5\" width=\"191.359375\" height=\"53\"></rect><g class=\"label\" style=\"\" transform=\"translate(-88.1796875, -19)\"><rect></rect><foreignObject width=\"176.359375\" height=\"38\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Skills Registry<br/>Codex-facing connectors</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-Workspace-5\" data-node=\"true\" data-id=\"Workspace\" transform=\"translate(615.8046875, 129.5)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-131.9296875\" y=\"-26.5\" width=\"263.859375\" height=\"53\"></rect><g class=\"label\" style=\"\" transform=\"translate(-124.4296875, -19)\"><rect></rect><foreignObject width=\"248.859375\" height=\"38\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Workspace<br/>state + identity + implementations</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-Vendors-7\" data-node=\"true\" data-id=\"Vendors\" transform=\"translate(615.8046875, 232.5)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-102.3515625\" y=\"-26.5\" width=\"204.703125\" height=\"53\"></rect><g class=\"label\" style=\"\" transform=\"translate(-94.8515625, -19)\"><rect></rect><foreignObject width=\"189.703125\" height=\"38\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">LLM vendors<br/>OpenAI / Bedrock / others</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-Soul-9\" data-node=\"true\" data-id=\"Soul\" transform=\"translate(922.1484375, 119.5)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-124.4140625\" y=\"-26.5\" width=\"248.828125\" height=\"53\"></rect><g class=\"label\" style=\"\" transform=\"translate(-116.9140625, -19)\"><rect></rect><foreignObject width=\"233.828125\" height=\"38\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">SOUL.md<br/>workspace identity and behavior</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-SkillHTTP-11\" data-node=\"true\" data-id=\"SkillHTTP\" transform=\"translate(922.1484375, 387)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-92.390625\" y=\"-26.5\" width=\"184.78125\" height=\"53\"></rect><g class=\"label\" style=\"\" transform=\"translate(-84.890625, -19)\"><rect></rect><foreignObject width=\"169.78125\" height=\"38\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Skill HTTP endpoints<br/>actual implementations</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-SessionStore-17\" data-node=\"true\" data-id=\"SessionStore\" transform=\"translate(615.8046875, 335.5)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-113.0546875\" y=\"-26.5\" width=\"226.109375\" height=\"53\"></rect><g class=\"label\" style=\"\" transform=\"translate(-105.5546875, -19)\"><rect></rect><foreignObject width=\"211.109375\" height=\"38\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Persistent store<br/>session jsonl + USER/MEMORY</span></div></foreignObject></g></g></g></g></g></svg></div>\n<h2 id=\"ownership-boundaries\">Ownership boundaries</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Component</th><th>Owns</th><th>Does not own</th></tr></thead><tbody><tr><td>Firestone or another caller</td><td>Conversation lifecycle orchestration, session metadata, product-facing flow</td><td>Codex runtime internals, connector implementations</td></tr><tr><td>BetaOne</td><td>Runtime assembly, Codex execution, session reconstruction, connector exposure, skill invocation, POD vendor abstraction</td><td>Workspace business logic, workspace-owned identity and state</td></tr><tr><td>Workspace</td><td><code>SOUL.md</code>, state/automata, eligibility decisions, skill implementations</td><td>Global runtime policy across all workspaces</td></tr><tr><td>Skills Registry</td><td>Connector definitions visible to Codex</td><td>Actual skill implementation logic</td></tr></tbody></table></div>\n<h2 id=\"dependency-direction\">Dependency direction</h2>\n<ul><li>Firestone is the main current caller of BetaOne, but BetaOne is not defined by Firestone alone.</li><li>BetaOne consumes workspace metadata and connector definitions but does not own the workspace&#x27;s internal implementation surface.</li><li>Workspaces expose controlled HTTP-facing capabilities and metadata endpoints.</li><li>Codex sees connectors, not implementations.</li><li>POD calls can bypass the Codex runtime path while still using BetaOne as the centralized vendor abstraction layer.</li></ul>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">Architecture baseline</div><div class=\"callout-body\"><p>The architecture is composable for multiple workspaces. Any single workspace is an example, not the defining structure of BetaOne.</p></div></aside>\n<h2 id=\"design-rules\">Design rules</h2>\n<h3 id=\"keep-betaone-caller-agnostic\">Keep BetaOne caller-agnostic</h3>\n<p>The main current orchestrator is Firestone, but the BetaOne interface should stay callable by systems other than Firestone.</p>\n<h3 id=\"keep-workspace-implementations-behind-interfaces\">Keep workspace implementations behind interfaces</h3>\n<p>Codex should only see normalized connector instructions and eligible skill exposure, never private workspace internals.</p>\n<h3 id=\"preserve-workspace-autonomy\">Preserve workspace autonomy</h3>\n<p>Workspace owners control automata, eligibility, <code>SOUL.md</code>, and implementation details while BetaOne controls runtime assembly and continuity.</p>\n<h3 id=\"centralize-vendor-facing-llm-practices\">Centralize vendor-facing LLM practices</h3>\n<p>Workspace developers should not need to solve provider keys, request shaping, or response parsing independently. POD exists so BetaOne can provide one internal surface for direct LLM access across teams.</p>", "searchText": "System Map High-level component model for BetaOne as a standalone runtime, including both the Codex execution path and POD as centralized LLM access for workspace developers. Component zoom-out Caller / Orchestrator Firestone is the main current one BetaOne agentic runtime Skills Registry Codex-facing connectors Workspace state + identity + implementations LLM vendors OpenAI / Bedrock / others SOUL.md workspace identity and behavior Skill HTTP endpoints actual implementations Persistent store session jsonl + USER/MEMORY Ownership boundaries Component Owns Does not own Firestone or another caller Conversation lifecycle orchestration, session metadata, product-facing flow Codex runtime internals, connector implementations BetaOne Runtime assembly, Codex execution, session reconstruction, connector exposure, skill invocation, POD vendor abstraction Workspace business logic, workspace-owned identity and state Workspace SOUL.md , state/automata, eligibility decisions, skill implementations Global runtime policy across all workspaces Skills Registry Connector definitions visible to Codex Actual skill implementation logic Dependency direction Firestone is the main current caller of BetaOne, but BetaOne is not defined by Firestone alone. BetaOne consumes workspace metadata and connector definitions but does not own the workspace's internal implementation surface. Workspaces expose controlled HTTP-facing capabilities and metadata endpoints. Codex sees connectors, not implementations. POD calls can bypass the Codex runtime path while still using BetaOne as the centralized vendor abstraction layer. Architecture baseline The architecture is composable for multiple workspaces. Any single workspace is an example, not the defining structure of BetaOne. Design rules Keep BetaOne caller-agnostic The main current orchestrator is Firestone, but the BetaOne interface should stay callable by systems other than Firestone. Keep workspace implementations behind interfaces Codex should only see normalized connector instructions and eligible skill exposure, never private workspace internals. Preserve workspace autonomy Workspace owners control automata, eligibility, SOUL.md , and implementation details while BetaOne controls runtime assembly and continuity. Centralize vendor-facing LLM practices Workspace developers should not need to solve provider keys, request shaping, or response parsing independently. POD exists so BetaOne can provide one internal surface for direct LLM access across teams."}, {"id": "runtime-pattern", "title": "Runtime Pattern", "slug": "runtime-pattern", "tab": "architecture", "group": "runtime", "order": 20, "summary": "How BetaOne reconstructs a Codex execution environment per interaction, injects files and connectors, and separates planner behavior from skill implementation internals.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"codex-in-lambda-pattern\">Codex-in-Lambda pattern</h2>\n<p>BetaOne treats each interaction as an isolated runtime assembly step. It prepares a Codex execution environment, reconstructs continuity from stored files and session state, injects the workspace and connector context, runs Codex, and persists the updated session snapshot for the next interaction.</p>\n<div class=\"diagram-shell\"><svg id=\"diagram-f5e0c80c0515\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width: 421.828125px;\" viewBox=\"-8 -8 421.828125 806\" role=\"graphics-document document\" aria-roledescription=\"flowchart-v2\"><style>#diagram-f5e0c80c0515{font-family:\"trebuchet ms\",verdana,arial,sans-serif;font-size:16px;fill:#ccc;}#diagram-f5e0c80c0515 .error-icon{fill:#a44141;}#diagram-f5e0c80c0515 .error-text{fill:#ddd;stroke:#ddd;}#diagram-f5e0 \" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Tell Codex the eligible sub-list for this interaction</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-Plan-11\" data-node=\"true\" data-id=\"Plan\" transform=\"translate(202.9140625, 521)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-115.2890625\" y=\"-17\" width=\"230.578125\" height=\"34\"></rect><g class=\"label\" style=\"\" transform=\"translate(-107.7890625, -9.5)\"><rect></rect><foreignObject width=\"215.578125\" height=\"19\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Run Codex planner / executor</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-Skills-13\" data-node=\"true\" data-id=\"Skills\" transform=\"translate(202.9140625, 605)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-202.9140625\" y=\"-17\" width=\"405.828125\" height=\"34\"></rect><g class=\"label\" style=\"\" transform=\"translate(-195.4140625, -9.5)\"><rect></rect><foreignObject width=\"390.828125\" height=\"19\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Invoke HTTP skill implementations through connectors</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-Persist-15\" data-node=\"true\" data-id=\"Persist\" transform=\"translate(202.9140625, 689)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-109.921875\" y=\"-17\" width=\"219.84375\" height=\"34\"></rect><g class=\"label\" style=\"\" transform=\"translate(-102.421875, -9.5)\"><rect></rect><foreignObject width=\"204.84375\" height=\"19\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Persist updated session jsonl</span></div></foreignObject></g></g><g class=\"node default default flowchart-label\" id=\"flowchart-Emit-17\" data-node=\"true\" data-id=\"Emit\" transform=\"translate(202.9140625, 773)\"><rect class=\"basic label-container\" style=\"\" rx=\"0\" ry=\"0\" x=\"-95.0625\" y=\"-17\" width=\"190.125\" height=\"34\"></rect><g class=\"label\" style=\"\" transform=\"translate(-87.5625, -9.5)\"><rect></rect><foreignObject width=\"175.125\" height=\"19\"><div xmlns=\"http://www.w3.org/1999/xhtml\" style=\"display: inline-block; white-space: nowrap;\"><span class=\"nodeLabel\">Emit Gists + final output</span></div></foreignObject></g></g></g></g></g></svg></div>\n<h2 id=\"what-betaone-prepares-before-codex-runs\">What BetaOne prepares before Codex runs</h2>\n<ul><li>session <code>jsonl</code> for continuity</li><li><code>SOUL.md</code> from the workspace on new session bootstrap</li><li><code>USER.md</code> and <code>MEMORY.md</code> from BetaOne-owned persistence</li><li>all connectors for the workspace</li><li>the eligible skill sub-list for the current interaction</li><li>the user input payload, which can be arbitrary JSON</li></ul>\n<h2 id=\"planner-model-split\">Planner model split</h2>\n<p>BetaOne uses Codex as the runtime engine. Skill implementations remain free to use whatever model or system they need behind their own endpoint. The planner and the skill implementation are therefore deliberately decoupled.</p>\n<aside class=\"callout callout-note\"><div class=\"callout-title\">Model policy</div><div class=\"callout-body\"><p>Codex handles planning and tool choice. Skill implementations may use other models, deterministic services, or non-LLM systems behind their own endpoints.</p></div></aside>\n<h2 id=\"why-expose-all-connectors-but-only-allow-some\">Why expose all connectors but only allow some</h2>\n<p>Codex cannot yet dynamically add or remove visible skills mid-session. BetaOne therefore makes all workspace connectors visible at session start, but constrains each interaction with an eligible sub-list provided by the workspace through the orchestration path.</p>\n<h2 id=\"runtime-consequences\">Runtime consequences</h2>\n<h3 id=\"skill-exposure-is-immutable-per-invocation\">Skill exposure is immutable per invocation</h3>\n<p>Once Codex starts with a specific eligible skill set, that exposure should stay fixed for the duration of that invocation.</p>\n<h3 id=\"state-can-still-affect-the-next-turn\">State can still affect the next turn</h3>\n<p>Eligibility is recalculated on the next invocation, allowing the system to enforce workspace-state changes without mutating the active run in place.</p>", "searchText": "Runtime Pattern How BetaOne reconstructs a Codex execution environment per interaction, injects files and connectors, and separates planner behavior from skill implementation internals. Codex-in-Lambda pattern BetaOne treats each interaction as an isolated runtime assembly step. It prepares a Codex execution environment, reconstructs continuity from stored files and session state, injects the workspace and connector context, runs Codex, and persists the updated session snapshot for the next interaction. Interaction invocation starts Create temporary HOME Restore session jsonl snapshot Inject SOUL.md, USER.md, MEMORY.md Expose all workspace connectors Tell Codex the eligible sub-list for this interaction Run Codex planner / executor Invoke HTTP skill implementations through connectors Persist updated session jsonl Emit Gists + final output What BetaOne prepares before Codex runs session jsonl for continuity SOUL.md from the workspace on new session bootstrap USER.md and MEMORY.md from BetaOne-owned persistence all connectors for the workspace the eligible skill sub-list for the current interaction the user input payload, which can be arbitrary JSON Planner model split BetaOne uses Codex as the runtime engine. Skill implementations remain free to use whatever model or system they need behind their own endpoint. The planner and the skill implementation are therefore deliberately decoupled. Model policy Codex handles planning and tool choice. Skill implementations may use other models, deterministic services, or non-LLM systems behind their own endpoints. Why expose all connectors but only allow some Codex cannot yet dynamically add or remove visible skills mid-session. BetaOne therefore makes all workspace connectors visible at session start, but constrains each interaction with an eligible sub-list provided by the workspace through the orchestration path. Runtime consequences Skill exposure is immutable per invocation Once Codex starts with a specific eligible skill set, that exposure should stay fixed for the duration of that invocation. State can still affect the next turn Eligibility is recalculated on the next invocation, allowing the system to enforce workspace-state changes without mutating the active run in place."}, {"id": "conversation-lifecycle", "title": "Conversation Lifecycle", "slug": "conversation-lifecycle", "tab": "architecture", "group": "runtime", "order": 30, "summary": "End-to-end sequence from incoming user input through pre-flight, BetaOne execution, Gists streaming, and post-flight response handling.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"end-to-end-sequence\">End-to-end sequence</h2>\n<div class=\"diagram-shell\"><svg id=\"diagram-96b85c1b352f\" width=\"100%\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width: 1601px;\" viewBox=\"-50 -10 1601 861\" role=\"graphics-document document\" aria-roledescription=\"sequence\"><g><rect x=\"1351\" y=\"775\" fill=\"#eaeaea\" stroke=\"#666\" width=\"150\" height=\"65\" name=\"P\" rx=\"3\" ry=\"3\" class=\"actor actor-bottom\"></rect><text x=\"1426\" y=\"807.5\" dominant-baseline=\"central\" alignment-baseline=\"central\" class=\"actor\" style=\"text-anchor: middle; font-size: 16px; font-weight: 400;\"><tspan x=\"1426\" dy=\"0\">Persistent Store</t seline=\"middle\" class=\"messageText\" dy=\"1em\" style=\"font-size: 16px; font-weight: 400;\">final output</text><line x1=\"825\" y1=\"617\" x2=\"279\" y2=\"617\" class=\"messageLine1\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#arrowhead)\" style=\"stroke-dasharray: 3, 3; fill: none;\"></line><text x=\"413\" y=\"632\" text-anchor=\"middle\" dominant-baseline=\"middle\" alignment-baseline=\"middle\" class=\"messageText\" dy=\"1em\" style=\"font-size: 16px; font-weight: 400;\">post-flight hook</text><line x1=\"276\" y1=\"663\" x2=\"549\" y2=\"663\" class=\"messageLine0\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#arrowhead)\" style=\"fill: none;\"></line><text x=\"416\" y=\"678\" text-anchor=\"middle\" dominant-baseline=\"middle\" alignment-baseline=\"middle\" class=\"messageText\" dy=\"1em\" style=\"font-size: 16px; font-weight: 400;\">transformed response or identity</text><line x1=\"552\" y1=\"709\" x2=\"279\" y2=\"709\" class=\"messageLine1\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#arrowhead)\" style=\"stroke-dasharray: 3, 3; fill: none;\"></line><text x=\"177\" y=\"724\" text-anchor=\"middle\" dominant-baseline=\"middle\" alignment-baseline=\"middle\" class=\"messageText\" dy=\"1em\" style=\"font-size: 16px; font-weight: 400;\">final response</text><line x1=\"274\" y1=\"755\" x2=\"79\" y2=\"755\" class=\"messageLine1\" stroke-width=\"2\" stroke=\"none\" marker-end=\"url(#arrowhead)\" style=\"stroke-dasharray: 3, 3; fill: none;\"></line></svg></div>\n<h2 id=\"current-flow-narrative\">Current flow narrative</h2>\n<ol><li>UI sends a user message into Firestone.</li><li>Firestone or another caller manages pre-flight orchestration with the workspace.</li><li>The workspace returns state-aware output, including which skills are eligible now.</li><li>Firestone invokes BetaOne for one interaction, passing identity, input, and eligibility context.</li><li>BetaOne reconstructs the Codex runtime environment.</li><li>BetaOne exposes all workspace connectors and instructs Codex which eligible sub-list may be used.</li><li>During execution, BetaOne may invoke skill implementations through the connectors.</li><li>Each invoked skill may emit short user-facing Gists derived from connector metadata.</li><li>BetaOne persists the updated session state and returns the final output.</li><li>Firestone can run post-flight orchestration before returning the user-visible result.</li></ol>\n<h2 id=\"lifecycle-notes\">Lifecycle notes</h2>\n<h3 id=\"preflight-shapes-the-invocation\">Preflight shapes the invocation</h3>\n<p>Pre-flight is the moment where workspace state and orchestration context influence what BetaOne is allowed to do for this interaction.</p>\n<h3 id=\"mid-flight-belongs-to-betaone\">Mid-flight belongs to BetaOne</h3>\n<p>Mid-flight is not a Firestone-owned lifecycle phase. It is BetaOne execution-time behavior. This is the phase where BetaOne may invoke skills and emit Gists.</p>\n<h3 id=\"gists-are-connector-derived-progress\">Gists are connector-derived progress</h3>\n<p>Gists are short user-facing progress summaries, typically one-liners such as <code>🌐 Searching the web</code>, derived from metadata on the invoked connector.</p>\n<h3 id=\"post-flight-remains-orchestration-owned\">Post-flight remains orchestration-owned</h3>\n<p>Post-flight is owned by the caller/orchestrator and the workspace hook model, not by the Codex runtime itself.</p>\n<aside class=\"callout callout-note\"><div class=\"callout-title\">Optional forwarding</div><div class=\"callout-body\"><p>Gists updates can be forwarded to workspace hooks when that helps the workspace react to in-progress activity, but the core finalization path must not depend on such forwarding.</p></div></aside>", "searchText": "Conversation Lifecycle End-to-end sequence from incoming user input through pre-flight, BetaOne execution, Gists streaming, and post-flight response handling. End-to-end sequence Persistent Store Skill Endpoint Skills Registry BetaOne Workspace Firestone / Caller Toluna UI Persistent Store Skill Endpoint Skills Registry BetaOne Workspace Firestone / Caller Toluna UI User input pre-flight request pre-flight output + eligible skills interaction invocation read session jsonl + USER/MEMORY fetch SOUL.md on new session resolve connectors invoke skill implementation(s) via connector normalized capability result Gists during execution write updated session jsonl final output post-flight hook transformed response or identity final response Current flow narrative UI sends a user message into Firestone. Firestone or another caller manages pre-flight orchestration with the workspace. The workspace returns state-aware output, including which skills are eligible now. Firestone invokes BetaOne for one interaction, passing identity, input, and eligibility context. BetaOne reconstructs the Codex runtime environment. BetaOne exposes all workspace connectors and instructs Codex which eligible sub-list may be used. During execution, BetaOne may invoke skill implementations through the connectors. Each invoked skill may emit short user-facing Gists derived from connector metadata. BetaOne persists the updated session state and returns the final output. Firestone can run post-flight orchestration before returning the user-visible result. Lifecycle notes Preflight shapes the invocation Pre-flight is the moment where workspace state and orchestration context influence what BetaOne is allowed to do for this interaction. Mid-flight belongs to BetaOne Mid-flight is not a Firestone-owned lifecycle phase. It is BetaOne execution-time behavior. This is the phase where BetaOne may invoke skills and emit Gists. Gists are connector-derived progress Gists are short user-facing progress summaries, typically one-liners such as 🌐 Searching the web , derived from metadata on the invoked connector. Post-flight remains orchestration-owned Post-flight is owned by the caller/orchestrator and the workspace hook model, not by the Codex runtime itself. Optional forwarding Gists updates can be forwarded to workspace hooks when that helps the workspace react to in-progress activity, but the core finalization path must not depend on such forwarding."}, {"id": "state-and-memory", "title": "State and Memory", "slug": "state-and-memory", "tab": "architecture", "group": "runtime", "order": 40, "summary": "How BetaOne reconstructs continuity across isolated interactions using session files, `SOUL.md`, `USER.md`, and `MEMORY.md`, and how ownership is divided.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"data-ownership\">Data ownership</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Domain</th><th>Primary owner</th><th>Notes</th></tr></thead><tbody><tr><td>Conversation lifecycle metadata</td><td>Firestone or another caller</td><td>Includes conversation identity and orchestration context</td></tr><tr><td>Session jsonl snapshot</td><td>BetaOne</td><td>Read and written per interaction to restore Codex continuity</td></tr><tr><td>Workspace state and automata</td><td>Workspace</td><td>Drives eligibility and hook behavior</td></tr><tr><td><code>SOUL.md</code></td><td>Workspace</td><td>Identity, intent, guardrails, expected behavior</td></tr><tr><td><code>USER.md</code></td><td>BetaOne</td><td>Durable user preference and interaction profile</td></tr><tr><td><code>MEMORY.md</code></td><td>BetaOne</td><td>Durable remembered facts and continuity context</td></tr></tbody></table></div>\n<h2 id=\"session-persistence-model\">Session persistence model</h2>\n<p>BetaOne reads the last persisted session snapshot at interaction start, reconstructs the Codex environment, and writes a fresh snapshot at the end of the run. This persistence loop is what allows separate invocations to appear as a continuous conversation.</p>\n<h2 id=\"new-session-bootstrap\">New-session bootstrap</h2>\n<ul><li>get <code>SOUL.md</code> from the workspace</li><li>load <code>USER.md</code> from BetaOne persistence or allocate defaults</li><li>load <code>MEMORY.md</code> from BetaOne persistence or allocate defaults</li><li>inject all workspace connectors</li><li>restore session <code>jsonl</code></li></ul>\n<h2 id=\"user-md-versus-memory-md\">USER.md versus MEMORY.md</h2>\n<h3 id=\"user-md\">USER.md</h3>\n<p>Use this for stable interaction preferences and profile-like context:</p>\n<ul><li>what to call the user</li><li>tone/style preferences</li><li>timezone or locale</li><li>standing preferences such as &quot;be concise&quot;</li><li>durable context about how to help the person</li></ul>\n<h3 id=\"memory-md\">MEMORY.md</h3>\n<p>Use this for remembered facts and continuity:</p>\n<ul><li>facts the user asked the system to remember</li><li>recent interaction context worth carrying forward</li><li>project state that helps the next session resume intelligently</li><li>casual but useful long-term memory</li></ul>\n<aside class=\"callout callout-note\"><div class=\"callout-title\">Rule of thumb</div><div class=\"callout-body\"><p>If it answers &quot;how should the system behave for this user?&quot; it belongs in <code>USER.md</code>. If it answers &quot;what should the system remember for later?&quot; it belongs in <code>MEMORY.md</code>.</p></div></aside>\n<h2 id=\"update-model\">Update model</h2>\n<p>BetaOne should not block the user-facing response on memory updates. Instead:</p>\n<ol><li>finish the interaction</li><li>persist the updated session files</li><li>queue a side job for memory evaluation</li><li>let an async worker decide whether <code>USER.md</code> and/or <code>MEMORY.md</code> should be updated</li></ol>\n<p>That worker can update by explicit user request or by system judgment.</p>\n<h2 id=\"what-continuity-does-not-mean\">What continuity does not mean</h2>\n<p>Continuity does not imply a warm process, in-memory runtime, or direct mutation of prior invocation state. It is reconstructed continuity, not process continuity.</p>", "searchText": "State and Memory How BetaOne reconstructs continuity across isolated interactions using session files, `SOUL.md`, `USER.md`, and `MEMORY.md`, and how ownership is divided. Data ownership Domain Primary owner Notes Conversation lifecycle metadata Firestone or another caller Includes conversation identity and orchestration context Session jsonl snapshot BetaOne Read and written per interaction to restore Codex continuity Workspace state and automata Workspace Drives eligibility and hook behavior SOUL.md Workspace Identity, intent, guardrails, expected behavior USER.md BetaOne Durable user preference and interaction profile MEMORY.md BetaOne Durable remembered facts and continuity context Session persistence model BetaOne reads the last persisted session snapshot at interaction start, reconstructs the Codex environment, and writes a fresh snapshot at the end of the run. This persistence loop is what allows separate invocations to appear as a continuous conversation. New-session bootstrap get SOUL.md from the workspace load USER.md from BetaOne persistence or allocate defaults load MEMORY.md from BetaOne persistence or allocate defaults inject all workspace connectors restore session jsonl USER.md versus MEMORY.md USER.md Use this for stable interaction preferences and profile-like context: what to call the user tone/style preferences timezone or locale standing preferences such as \"be concise\" durable context about how to help the person MEMORY.md Use this for remembered facts and continuity: facts the user asked the system to remember recent interaction context worth carrying forward project state that helps the next session resume intelligently casual but useful long-term memory Rule of thumb If it answers \"how should the system behave for this user?\" it belongs in USER.md . If it answers \"what should the system remember for later?\" it belongs in MEMORY.md . Update model BetaOne should not block the user-facing response on memory updates. Instead: finish the interaction persist the updated session files queue a side job for memory evaluation let an async worker decide whether USER.md and/or MEMORY.md should be updated That worker can update by explicit user request or by system judgment. What continuity does not mean Continuity does not imply a warm process, in-memory runtime, or direct mutation of prior invocation state. It is reconstructed continuity, not process continuity."}, {"id": "workspace-model", "title": "Workspace Model", "slug": "workspace-model", "tab": "integration", "group": "workspaces", "order": 10, "summary": "Responsibilities of a workspace as a conversational AI project, including metadata, state, automata, skill implementations, and eligibility decisions.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"workspace-responsibilities\">Workspace responsibilities</h2>\n<p>A workspace is a conversational AI project that BetaOne can run against. It is the integration boundary where BetaOne meets domain-specific state, identity, and skill implementations.</p>\n<ul><li>expose workspace metadata such as <code>SOUL.md</code></li><li>expose the workspace skill list</li><li>own automata and state transitions</li><li>decide which skills are eligible in the current state</li><li>implement workspace-specific capabilities behind HTTP endpoints</li></ul>\n<h2 id=\"what-codex-should-see\">What Codex should see</h2>\n<p>Codex should see:</p>\n<ul><li>workspace-facing instructions</li><li>connector definitions</li><li>eligible skills for the current invocation</li><li>state-relevant constraints injected as instructions</li></ul>\n<p>Codex should not see:</p>\n<ul><li>private workspace internals</li><li>implementation-specific service topology</li><li>arbitrary non-eligible skills</li></ul>\n<h2 id=\"soul-md-and-metadata\">SOUL.md and metadata</h2>\n<p><code>SOUL.md</code> acts as a workspace-facing instruction surface. It is conceptually fetched by BetaOne and incorporated into the invocation context together with the current state and skill eligibility instructions.</p>\n<h2 id=\"state-driven-eligibility\">State-driven eligibility</h2>\n<p>Eligibility is dynamic at interaction assembly time and based on the current workspace state. This lets the workspace keep a connector globally registered while still turning it effectively ON or OFF for a specific interaction.</p>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">Integration rule</div><div class=\"callout-body\"><p>Connector registration is not the same as connector eligibility. Registration defines what exists; state-based eligibility defines what can be used now.</p></div></aside>\n<h2 id=\"implementation-boundary\">Implementation boundary</h2>\n<p>The workspace owns implementations behind HTTP endpoints. BetaOne and Codex interact with the normalized connector layer, not the hidden implementation details behind it.</p>\n<h2 id=\"what-a-workspace-must-provide\">What a workspace must provide</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Artifact or capability</th><th>Why BetaOne needs it</th></tr></thead><tbody><tr><td><code>workspace_id</code></td><td>To resolve the right identity, state, and connector set</td></tr><tr><td><code>SOUL.md</code></td><td>To understand workspace identity and behavioral guidance</td></tr><tr><td>skill implementations</td><td>To execute capabilities through connectors</td></tr><tr><td>state / automata</td><td>To determine what is eligible now</td></tr><tr><td>eligible skill list per interaction</td><td>To constrain Codex within the currently allowed subset</td></tr></tbody></table></div>", "searchText": "Workspace Model Responsibilities of a workspace as a conversational AI project, including metadata, state, automata, skill implementations, and eligibility decisions. Workspace responsibilities A workspace is a conversational AI project that BetaOne can run against. It is the integration boundary where BetaOne meets domain-specific state, identity, and skill implementations. expose workspace metadata such as SOUL.md expose the workspace skill list own automata and state transitions decide which skills are eligible in the current state implement workspace-specific capabilities behind HTTP endpoints What Codex should see Codex should see: workspace-facing instructions connector definitions eligible skills for the current invocation state-relevant constraints injected as instructions Codex should not see: private workspace internals implementation-specific service topology arbitrary non-eligible skills SOUL.md and metadata SOUL.md acts as a workspace-facing instruction surface. It is conceptually fetched by BetaOne and incorporated into the invocation context together with the current state and skill eligibility instructions. State-driven eligibility Eligibility is dynamic at interaction assembly time and based on the current workspace state. This lets the workspace keep a connector globally registered while still turning it effectively ON or OFF for a specific interaction. Integration rule Connector registration is not the same as connector eligibility. Registration defines what exists; state-based eligibility defines what can be used now. Implementation boundary The workspace owns implementations behind HTTP endpoints. BetaOne and Codex interact with the normalized connector layer, not the hidden implementation details behind it. What a workspace must provide Artifact or capability Why BetaOne needs it workspace_id To resolve the right identity, state, and connector set SOUL.md To understand workspace identity and behavioral guidance skill implementations To execute capabilities through connectors state / automata To determine what is eligible now eligible skill list per interaction To constrain Codex within the currently allowed subset"}, {"id": "event-and-invocation-contracts", "title": "Event and Invocation Contracts", "slug": "event-and-invocation-contracts", "tab": "integration", "group": "connectors", "order": 20, "summary": "Proposed conceptual contracts across callers, BetaOne, workspaces, and skill implementations for one interaction.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"caller-workspace-pre-flight\">Caller -&gt; Workspace pre-flight</h2>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">Pre-flight request</div><div class=\"callout-body\"><p>Conceptual payload:</p>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;session_id&quot;: &quot;sess_123&quot;,\n  &quot;workspace_id&quot;: &quot;media_workspace&quot;,\n  &quot;user_id&quot;: &quot;user_456&quot;,\n  &quot;input&quot;: {},\n  &quot;metadata&quot;: {}\n}</code></pre></div></div></aside>\n<p>The workspace may return an identity response, or it may return state-derived data such as eligible skills and workspace-specific pre-flight enrichment.</p>\n<h2 id=\"caller-betaone-interaction-invocation\">Caller -&gt; BetaOne interaction invocation</h2>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">Proposed primary API payload</div><div class=\"callout-body\"><p>Conceptual payload:</p>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;workspace_id&quot;: &quot;media_workspace&quot;,\n  &quot;session_id&quot;: &quot;sess_123&quot;,\n  &quot;user_id&quot;: &quot;user_456&quot;,\n  &quot;input&quot;: {\n    &quot;type&quot;: &quot;chat_message&quot;,\n    &quot;content&quot;: &quot;Find the latest highlights and summarize them&quot;\n  },\n  &quot;eligible_skills&quot;: [&quot;search_video_catalog&quot;, &quot;summarize_results&quot;],\n  &quot;metadata&quot;: {},\n  &quot;preflight_output&quot;: {}\n}</code></pre></div></div></aside>\n<p>This is intentionally interaction-based rather than session-resource-based. BetaOne reconstructs the session; the caller invokes one interaction.</p>\n<h2 id=\"betaone-workspace-metadata-endpoints\">BetaOne -&gt; Workspace metadata endpoints</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Endpoint</th><th>Purpose</th></tr></thead><tbody><tr><td><code>GET SOUL.md</code></td><td>Workspace-facing instruction and guidance surface</td></tr><tr><td><code>GET workspace skill list</code></td><td>Enumerates workspace-owned capabilities or connector source inputs when needed</td></tr><tr><td>Optional metadata endpoints</td><td>Additional state or capability metadata when needed</td></tr></tbody></table></div>\n<h2 id=\"betaone-skill-endpoint-connector-call\">BetaOne -&gt; Skill endpoint connector call</h2>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">Normalized connector invocation</div><div class=\"callout-body\"><p>Conceptual payload:</p>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;capability&quot;: &quot;search_video_catalog&quot;,\n  &quot;input&quot;: {\n    &quot;query&quot;: &quot;latest highlights&quot;\n  },\n  &quot;context&quot;: {\n    &quot;workspace_id&quot;: &quot;media_workspace&quot;,\n    &quot;session_id&quot;: &quot;sess_123&quot;,\n    &quot;user_id&quot;: &quot;user_456&quot;\n  }\n}</code></pre></div></div></aside>\n<p>If the connector has metadata for Gists, BetaOne may emit mid-flight Gists while the invocation is in progress.</p>\n<h2 id=\"betaone-caller-outputs\">BetaOne -&gt; Caller outputs</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Event type</th><th>Meaning</th></tr></thead><tbody><tr><td><code>gist</code></td><td>Midflight progress event intended for streaming UI feedback</td></tr><tr><td><code>final_output</code></td><td>The final result of the runtime invocation</td></tr></tbody></table></div>\n<h2 id=\"contract-principles\">Contract principles</h2>\n<ul><li>make the primary public API interaction-based</li><li>normalize envelopes even if implementations differ behind the endpoint</li><li>allow identity and no-op behavior from workspace pre-flight and post-flight hooks</li><li>keep transport conceptual in this document and avoid SDK-level detail</li></ul>", "searchText": "Event and Invocation Contracts Proposed conceptual contracts across callers, BetaOne, workspaces, and skill implementations for one interaction. Caller -> Workspace pre-flight Pre-flight request Conceptual payload: json Copy { \"session_id\": \"sess_123\", \"workspace_id\": \"media_workspace\", \"user_id\": \"user_456\", \"input\": {}, \"metadata\": {} } The workspace may return an identity response, or it may return state-derived data such as eligible skills and workspace-specific pre-flight enrichment. Caller -> BetaOne interaction invocation Proposed primary API payload Conceptual payload: json Copy { \"workspace_id\": \"media_workspace\", \"session_id\": \"sess_123\", \"user_id\": \"user_456\", \"input\": { \"type\": \"chat_message\", \"content\": \"Find the latest highlights and summarize them\" }, \"eligible_skills\": [\"search_video_catalog\", \"summarize_results\"], \"metadata\": {}, \"preflight_output\": {} } This is intentionally interaction-based rather than session-resource-based. BetaOne reconstructs the session; the caller invokes one interaction. BetaOne -> Workspace metadata endpoints Endpoint Purpose GET SOUL.md Workspace-facing instruction and guidance surface GET workspace skill list Enumerates workspace-owned capabilities or connector source inputs when needed Optional metadata endpoints Additional state or capability metadata when needed BetaOne -> Skill endpoint connector call Normalized connector invocation Conceptual payload: json Copy { \"capability\": \"search_video_catalog\", \"input\": { \"query\": \"latest highlights\" }, \"context\": { \"workspace_id\": \"media_workspace\", \"session_id\": \"sess_123\", \"user_id\": \"user_456\" } } If the connector has metadata for Gists, BetaOne may emit mid-flight Gists while the invocation is in progress. BetaOne -> Caller outputs Event type Meaning gist Midflight progress event intended for streaming UI feedback final_output The final result of the runtime invocation Contract principles make the primary public API interaction-based normalize envelopes even if implementations differ behind the endpoint allow identity and no-op behavior from workspace pre-flight and post-flight hooks keep transport conceptual in this document and avoid SDK-level detail"}, {"id": "building-a-skill", "title": "Building a Skill", "slug": "building-a-skill", "tab": "integration", "group": "connectors", "order": 25, "summary": "What a skill is, how to implement one behind HTTP, and how that implementation relates to connectors and workspace ownership.", "audience": "", "status": "Current Guide", "hero": null, "cards": [], "html": "<h2 id=\"what-a-skill-is\">What a skill is</h2>\n<p>A skill is any executable capability that BetaOne can reach over HTTP through a connector. The implementation can be a function, a service, or another agentic component. What matters to BetaOne is that the capability can be invoked predictably.</p>\n<h2 id=\"where-a-skill-lives\">Where a skill lives</h2>\n<p>Most skills live in a workspace because they express workspace-specific behavior. Some shared capabilities can live outside workspaces as common skills.</p>\n<div class=\"table-shell\"><table><thead><tr><th>Type</th><th>Lives where</th><th>Example use</th></tr></thead><tbody><tr><td>Workspace-specific skill</td><td>Inside the workspace project</td><td>Domain-specific retrieval, actions, business flows</td></tr><tr><td>Common skill</td><td>Shared service outside a single workspace</td><td>Reusable infrastructure-like capability</td></tr></tbody>
