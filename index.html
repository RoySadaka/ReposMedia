</table></div>\n<h2 id=\"skill-implementation-checklist\">Skill implementation checklist</h2>\n<ol><li>expose the capability over HTTP</li><li>define clear input and output shapes</li><li>decide what user-facing Gists should be emitted while it runs</li><li>create the connector files in the Skills Registry</li><li>make the workspace include the connector in its available skill set</li></ol>\n<h2 id=\"what-the-workspace-owns\">What the workspace owns</h2>\n<ul><li>the skill implementation</li><li>any internal service topology</li><li>business logic</li><li>state and eligibility decisions</li></ul>\n<h2 id=\"what-the-registry-owns\">What the registry owns</h2>\n<ul><li>the connector visible to Codex</li><li>the invocation contract BetaOne uses</li><li>the template for Gists</li><li>the usage guidance that helps Codex know when to call the skill</li></ul>\n<aside class=\"callout callout-note\"><div class=\"callout-title\">Important separation</div><div class=\"callout-body\"><p>Building a skill is not the same as building a connector. A skill is the real implementation. A connector is the Codex-facing contract that points to it.</p></div></aside>\n<h2 id=\"minimal-implementation-expectations\">Minimal implementation expectations</h2>\n<ul><li>deterministic enough to be called safely by an agentic runtime</li><li>explicit request/response behavior</li><li>timeouts and failure modes that BetaOne can normalize</li><li>input semantics that are teachable to Codex through the connector</li></ul>", "searchText": "Building a Skill What a skill is, how to implement one behind HTTP, and how that implementation relates to connectors and workspace ownership. What a skill is A skill is any executable capability that BetaOne can reach over HTTP through a connector. The implementation can be a function, a service, or another agentic component. What matters to BetaOne is that the capability can be invoked predictably. Where a skill lives Most skills live in a workspace because they express workspace-specific behavior. Some shared capabilities can live outside workspaces as common skills. Type Lives where Example use Workspace-specific skill Inside the workspace project Domain-specific retrieval, actions, business flows Common skill Shared service outside a single workspace Reusable infrastructure-like capability Skill implementation checklist expose the capability over HTTP define clear input and output shapes decide what user-facing Gists should be emitted while it runs create the connector files in the Skills Registry make the workspace include the connector in its available skill set What the workspace owns the skill implementation any internal service topology business logic state and eligibility decisions What the registry owns the connector visible to Codex the invocation contract BetaOne uses the template for Gists the usage guidance that helps Codex know when to call the skill Important separation Building a skill is not the same as building a connector. A skill is the real implementation. A connector is the Codex-facing contract that points to it. Minimal implementation expectations deterministic enough to be called safely by an agentic runtime explicit request/response behavior timeouts and failure modes that BetaOne can normalize input semantics that are teachable to Codex through the connector"}, {"id": "skills-and-registry", "title": "Skills and Registry", "slug": "skills-and-registry", "tab": "integration", "group": "connectors", "order": 30, "summary": "Connector registration model, registry organization, and the separation between Codex-visible connectors and hidden implementations.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"what-a-skill-is\">What a skill is</h2>\n<p>A skill is any code capability that BetaOne can reach over HTTP through a connector contract. In practice, most skills live in workspaces, while some shared skills may live as standalone services.</p>\n<h2 id=\"what-a-connector-is\">What a connector is</h2>\n<p>A skill connector is the Codex-facing contract for a skill. It is not the implementation itself. The connector tells Codex what the capability is, when to use it, and gives BetaOne enough invocation metadata to call the underlying implementation.</p>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">Two roles in one object</div><div class=\"callout-body\"><p>A connector primarily exists for Codex awareness and skill selection, but it also carries the HTTP invocation contract BetaOne needs at runtime.</p></div></aside>\n<h2 id=\"a-connector-can-expose-a-suite-of-capabilities\">A connector can expose a suite of capabilities</h2>\n<p>The simplest mental model is &quot;one connector, one HTTP capability&quot;, but that is not the limit. A single connector folder can represent one service and expose multiple related capabilities under it.</p>\n<p>For example, a service like Parrot can expose a capability suite such as:</p>\n<ul><li><code>describe_image</code></li><li><code>transcribe_audio</code></li><li><code>describe_video</code></li></ul>\n<p>In that model:</p>\n<ul><li>the folder represents the Parrot service as one connector family</li><li>Codex still sees individually callable capabilities</li><li>BetaOne still invokes concrete HTTP endpoints behind those capability definitions</li><li>shared docs and service metadata can live once at the folder root</li></ul>\n<h2 id=\"registry-structure\">Registry structure</h2>\n<p>The registry should organize shared and workspace-specific connectors without making BetaOne special-case a single workspace.</p>\n<ul><li>common connectors available across workspaces</li><li>workspace folders that hold workspace-specific connector registrations</li><li>Codex-style templates for connector instructions</li><li>per-skill Gists metadata</li></ul>\n<h2 id=\"what-lives-in-a-connector\">What lives in a connector</h2>\n<p>At a documentation level, the connector should describe at least:</p>\n<ul><li>capability name</li><li>description</li><li>when to use it</li><li>constraints or when not to use it</li><li>input shape</li><li>output shape</li><li>template for Gists</li><li>HTTP invocation target and method</li><li>request/response mapping rules</li></ul>\n<p>If the connector is a multi-capability service, add:</p>\n<ul><li>shared service metadata at the root</li><li>one capability file per callable operation</li><li>one shared <code>SKILL.md</code> or root guidance file for the service family</li></ul>\n<h2 id=\"connector-registration-versus-implementation\">Connector registration versus implementation</h2>\n<p>Connector registration lives in the registry layer and defines how BetaOne exposes the capability to Codex.</p>\n<p>Skill implementation lives behind a workspace or shared HTTP endpoint and defines how the capability is actually executed.</p>\n<aside class=\"callout callout-note\"><div class=\"callout-title\">Separation of concerns</div><div class=\"callout-body\"><p>Registration answers “what can Codex call?” Implementation answers “how is that capability fulfilled?”</p></div></aside>\n<h2 id=\"mixing-common-and-workspace-skills\">Mixing common and workspace skills</h2>\n<p>The same conversation should be able to use both shared connectors and workspace-specific connectors, as long as each one is eligible in the current invocation state.</p>\n<h2 id=\"gists-metadata\">Gists metadata</h2>\n<p>Gists usually come from a short template on the connector, for example:</p>\n<ul><li><code>🎥 Processing the video</code></li><li><code>🌐 Searching the web</code></li></ul>\n<p>The template may be a plain string or a Python-style format string.</p>\n<h2 id=\"connector-authoring-expectations\">Connector authoring expectations</h2>\n<ul><li>provide a clear capability description</li><li>define normalized input and output shapes</li><li>document whether the connector can emit user-facing progress as Gists</li><li>keep the connector contract stable even if the backend implementation changes</li></ul>\n<h2 id=\"why-all-connectors-are-visible-from-the-start\">Why all connectors are visible from the start</h2>\n<p>Codex must be aware of all available connectors when the session begins. BetaOne cannot rely on dynamically adding or removing connectors from Codex mid-session, so it exposes the full set at session start and narrows usage through per-interaction eligibility instructions.</p>\n<h2 id=\"concrete-example\">Concrete example</h2>\n<p>See <a href=\"#/connector-example\">Connector Example</a> for a full Parrot-style service connector that exposes multiple capabilities from one registry folder.</p>", "searchText": "Skills and Registry Connector registration model, registry organization, and the separation between Codex-visible connectors and hidden implementations. What a skill is A skill is any code capability that BetaOne can reach over HTTP through a connector contract. In practice, most skills live in workspaces, while some shared skills may live as standalone services. What a connector is A skill connector is the Codex-facing contract for a skill. It is not the implementation itself. The connector tells Codex what the capability is, when to use it, and gives BetaOne enough invocation metadata to call the underlying implementation. Two roles in one object A connector primarily exists for Codex awareness and skill selection, but it also carries the HTTP invocation contract BetaOne needs at runtime. A connector can expose a suite of capabilities The simplest mental model is \"one connector, one HTTP capability\", but that is not the limit. A single connector folder can represent one service and expose multiple related capabilities under it. For example, a service like Parrot can expose a capability suite such as: describe_image transcribe_audio describe_video In that model: the folder represents the Parrot service as one connector family Codex still sees individually callable capabilities BetaOne still invokes concrete HTTP endpoints behind those capability definitions shared docs and service metadata can live once at the folder root Registry structure The registry should organize shared and workspace-specific connectors without making BetaOne special-case a single workspace. common connectors available across workspaces workspace folders that hold workspace-specific connector registrations Codex-style templates for connector instructions per-skill Gists metadata What lives in a connector At a documentation level, the connector should describe at least: capability name description when to use it constraints or when not to use it input shape output shape template for Gists HTTP invocation target and method request/response mapping rules If the connector is a multi-capability service, add: shared service metadata at the root one capability file per callable operation one shared SKILL.md or root guidance file for the service family Connector registration versus implementation Connector registration lives in the registry layer and defines how BetaOne exposes the capability to Codex. Skill implementation lives behind a workspace or shared HTTP endpoint and defines how the capability is actually executed. Separation of concerns Registration answers “what can Codex call?” Implementation answers “how is that capability fulfilled?” Mixing common and workspace skills The same conversation should be able to use both shared connectors and workspace-specific connectors, as long as each one is eligible in the current invocation state. Gists metadata Gists usually come from a short template on the connector, for example: 🎥 Processing the video 🌐 Searching the web The template may be a plain string or a Python-style format string. Connector authoring expectations provide a clear capability description define normalized input and output shapes document whether the connector can emit user-facing progress as Gists keep the connector contract stable even if the backend implementation changes Why all connectors are visible from the start Codex must be aware of all available connectors when the session begins. BetaOne cannot rely on dynamically adding or removing connectors from Codex mid-session, so it exposes the full set at session start and narrows usage through per-interaction eligibility instructions. Concrete example See Connector Example for a full Parrot-style service connector that exposes multiple capabilities from one registry folder."}, {"id": "connector-example", "title": "Connector Example", "slug": "connector-example", "tab": "integration", "group": "connectors", "order": 35, "summary": "Realistic Parrot-style multi-capability connector example showing how one service can expose several Codex-visible capabilities from one registry folder.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"example-goal\">Example goal</h2>\n<p>This page now shows two connector patterns:</p>\n<ol><li>a common shared service connector family using Parrot</li><li>a workspace-specific connector for a custom capability called <code>brand_sentiment_analysis</code></li></ol>\n<p>That combination is closer to how BetaOne should actually look in practice: some skills are cross-workspace services, while others exist only inside one workspace domain.</p>\n<h2 id=\"example-folder-shape\">Example folder shape</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">text</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-text\">skills-registry/\n  Common/\n    parrot/\n      service.toml\n      SKILL.md\n      capabilities/\n        describe_image.toml\n        transcribe_audio.toml\n        describe_video.toml\n  Workspaces/\n    brand_tracker/\n      brand_sentiment_analysis/\n        connector.toml\n        SKILL.md\n        input.schema.json\n        output.schema.json</code></pre></div>\n<h2 id=\"why-this-structure-works\">Why this structure works</h2>\n<p>It gives BetaOne and Codex:</p>\n<ul><li>one root place for the Parrot service identity</li><li>one shared guidance file describing what Parrot does</li><li>one capability file per actual callable operation</li><li>room for different HTTP methods and request shapes per capability</li></ul>\n<p>It mirrors the direct media capabilities that matter most for Codex-facing usage:</p>\n<ul><li><code>POST /v1/image</code></li><li><code>POST /v1/audio</code></li><li><code>POST /v1/video</code></li></ul>\n<h2 id=\"example-service-toml\">Example <code>service.toml</code></h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">toml</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-toml\">name = &quot;parrot&quot;\ntitle = &quot;Parrot&quot;\ndescription = &quot;Multimodal media understanding service that converts image, audio, video, and rich text stimuli into textual outputs usable by agentic runtimes.&quot;\nkind = &quot;service_connector&quot;\nbase_url_env = &quot;PARROT_BASE_URL&quot;\nclient_id_header = &quot;X-Client-ID&quot;\n\n[service]\nowner = &quot;shared-platform&quot;\ntransport = &quot;http&quot;\ndocs = &quot;Parrot processes media into textual descriptions and transcriptions that BetaOne can reason over.&quot;</code></pre></div>\n<h2 id=\"example-skill-md\">Example <code>SKILL.md</code></h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">md</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-md\"># Parrot\n\nParrot is a multimodal service connector family for working with media stimuli.\n\nUse Parrot when the interaction needs textual understanding of:\n- images\n- audio\n- video\n- rich text with embedded media references\n\nParrot is especially useful when:\n- the same media needs to be processed once and reused many times\n- downstream reasoning should happen over text rather than raw media\n- a workspace needs media understanding without embedding that complexity directly into BetaOne\n\nCapabilities exposed by this connector family:\n- `describe_image`\n- `transcribe_audio`\n- `describe_video`\n\nGeneral guidance:\n- use the image capability for visual understanding\n- use the audio capability for spoken content\n- use the video capability for combined visual and vocal understanding</code></pre></div>\n<h2 id=\"example-capability-file-capabilities-describe-image-toml\">Example capability file: <code>capabilities/describe_image.toml</code></h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">toml</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-toml\">name = &quot;describe_image&quot;\ntitle = &quot;Describe Image&quot;\ndescription = &quot;Analyze an image and return textual description, OCR, style, category, size, and extracted elements.&quot;\nwhen_to_use = &quot;Use for direct image understanding when the interaction needs a textual rendering of visual content.&quot;\nconstraints = &quot;Requires an image URL.&quot;\ngist_template = &quot;🖼️ Parsing the image&quot;\n\n[http]\nmethod = &quot;POST&quot;\npath = &quot;/v1/image&quot;\ntimeout_seconds = 20\n\n[request_mapping]\nUrl = &quot;$.input.url&quot;\n\n[response_mapping]\ndescription = &quot;$.Description&quot;\nocr = &quot;$.Ocr&quot;\nstyle = &quot;$.Style&quot;\ncategory = &quot;$.Category&quot;\nheight = &quot;$.Height&quot;\nwidth = &quot;$.Width&quot;\nelements = &quot;$.Elements&quot;</code></pre></div>\n<h2 id=\"example-capability-file-capabilities-transcribe-audio-toml\">Example capability file: <code>capabilities/transcribe_audio.toml</code></h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">toml</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-toml\">name = &quot;transcribe_audio&quot;\ntitle = &quot;Transcribe Audio&quot;\ndescription = &quot;Transcribe spoken audio and return transcription, description, language, duration, and extracted elements.&quot;\nwhen_to_use = &quot;Use when the interaction needs text from vocal audio content.&quot;\nconstraints = &quot;Requires an audio URL. Background sounds and music are not described yet.&quot;\ngist_template = &quot;🎧 Parsing the audio&quot;\n\n[http]\nmethod = &quot;POST&quot;\npath = &quot;/v1/audio&quot;\ntimeout_seconds = 30\n\n[request_mapping]\nUrl = &quot;$.input.url&quot;\nLanguage = &quot;$.input.language&quot;\nGlossary = &quot;$.input.glossary&quot;\n\n[response_mapping]\ntranscription = &quot;$.Transcription&quot;\ndescription = &quot;$.Description&quot;\nlanguage = &quot;$.TranscriptionLanguage&quot;\nduration = &quot;$.Duration&quot;\nelements = &quot;$.Elements&quot;</code></pre></div>\n<h2 id=\"example-capability-file-capabilities-describe-video-toml\">Example capability file: <code>capabilities/describe_video.toml</code></h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">toml</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-toml\">name = &quot;describe_video&quot;\ntitle = &quot;Describe Video&quot;\ndescription = &quot;Process video by combining visual understanding and audio transcription into a textual summary of the content.&quot;\nwhen_to_use = &quot;Use when the interaction needs a textual understanding of video content.&quot;\nconstraints = &quot;Requires a video URL. Background sounds and music are not described yet.&quot;\ngist_template = &quot;🎥 Parsing the video&quot;\n\n[http]\nmethod = &quot;POST&quot;\npath = &quot;/v1/video&quot;\ntimeout_seconds = 45\n\n[request_mapping]\nUrl = &quot;$.input.url&quot;\nLanguage = &quot;$.input.language&quot;\nGlossary = &quot;$.input.glossary&quot;\n\n[response_mapping]\ntranscription = &quot;$.Transcription&quot;\nlanguage = &quot;$.TranscriptionLanguage&quot;\ndescription = &quot;$.Description&quot;\nstyle = &quot;$.Style&quot;\ncategory = &quot;$.Category&quot;\nduration = &quot;$.Duration&quot;\nheight = &quot;$.Height&quot;\nwidth = &quot;$.Width&quot;\nelements = &quot;$.Elements&quot;</code></pre></div>\n<h2 id=\"what-this-teaches\">What this teaches</h2>\n<ul><li>the connector is primarily for Codex awareness</li><li>a single connector folder can expose a family of related capabilities</li><li>Gists behavior can be defined per capability</li><li>HTTP invocation details live alongside the Codex-facing guidance</li><li>the real backend implementation still lives outside the registry</li><li>one service like Parrot can expose a small direct capability suite cleanly from one folder</li></ul>\n<h2 id=\"workspace-specific-example-brand-sentiment-analysis\">Workspace-specific example: <code>brand_sentiment_analysis</code></h2>\n<p>This second example shows the opposite pattern: not a shared service family, but one workspace-specific connector for a capability that only makes sense inside a particular workspace.</p>\n<h2 id=\"example-workspace-specific-folder-shape\">Example workspace-specific folder shape</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">text</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-text\">skills-registry/\n  Workspaces/\n    brand_tracker/\n      brand_sentiment_analysis/\n        connector.toml\n        SKILL.md\n        input.schema.json\n        output.schema.json</code></pre></div>\n<h2 id=\"example-connector-toml\">Example <code>connector.toml</code></h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">toml</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-toml\">name = &quot;brand_sentiment_analysis&quot;\ntitle = &quot;Brand Sentiment Analysis&quot;\ndescription = &quot;Analyze textual feedback and estimate brand sentiment, themes, and risk signals for the current workspace.&quot;\nwhen_to_use = &quot;Use when the interaction needs a sentiment read on brand-related feedback, comments, transcripts, or survey answers.&quot;\nconstraints = &quot;Only use inside the brand-tracker workspace. Do not use as a generic sentiment tool when a workspace-specific interpretation is required.&quot;\ngist_template = &quot;📊 Analyzing brand sentiment&quot;\n\n[http]\nmethod = &quot;POST&quot;\nurl = &quot;https://brand-tracker.internal/api/v1/brand-sentiment&quot;\ntimeout_seconds = 20\n\n[request_mapping]\nbrand = &quot;$.input.brand&quot;\ntexts = &quot;$.input.texts&quot;\nmarket = &quot;$.input.market&quot;\nlanguage = &quot;$.input.language&quot;\n\n[response_mapping]\noverall_sentiment = &quot;$.overall_sentiment&quot;\nconfidence = &quot;$.confidence&quot;\nthemes = &quot;$.themes&quot;\nrisk_flags = &quot;$.risk_flags&quot;\nsummary = &quot;$.summary&quot;</code></pre></div>\n<h2 id=\"example-skill-md-2\">Example <code>SKILL.md</code></h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">md</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-md\"># Brand Sentiment Analysis\n\nUse this skill to analyze how a brand is being perceived in a body of text.\n\nGood use cases:\n- survey open-end responses\n- interview transcripts\n- social or community comments\n- brand campaign reactions\n\nExpected output:\n- overall sentiment\n- confidence score\n- major themes\n- risk flags\n- concise summary\n\nAvoid using this skill when:\n- the text is not about a brand or branded experience\n- the workspace needs raw text transformation instead of brand interpretation</code></pre></div>\n<h2 id=\"example-input-schema-json\">Example <code>input.schema.json</code></h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;type&quot;: &quot;object&quot;,\n  &quot;required&quot;: [&quot;brand&quot;, &quot;texts&quot;],\n  &quot;properties&quot;: {\n    &quot;brand&quot;: { &quot;type&quot;: &quot;string&quot; },\n    &quot;texts&quot;: {\n      &quot;type&quot;: &quot;array&quot;,\n      &quot;items&quot;: { &quot;type&quot;: &quot;string&quot; }\n    },\n    &quot;market&quot;: { &quot;type&quot;: &quot;string&quot; },\n    &quot;language&quot;: { &quot;type&quot;: &quot;string&quot; }\n  }\n}</code></pre></div>\n<h2 id=\"example-output-schema-json\">Example <code>output.schema.json</code></h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;type&quot;: &quot;object&quot;,\n  &quot;required&quot;: [&quot;overall_sentiment&quot;, &quot;summary&quot;],\n  &quot;properties&quot;: {\n    &quot;overall_sentiment&quot;: { &quot;type&quot;: &quot;string&quot; },\n    &quot;confidence&quot;: { &quot;type&quot;: &quot;number&quot; },\n    &quot;themes&quot;: {\n      &quot;type&quot;: &quot;array&quot;,\n      &quot;items&quot;: { &quot;type&quot;: &quot;string&quot; }\n    },\n    &quot;risk_flags&quot;: {\n      &quot;type&quot;: &quot;array&quot;,\n      &quot;items&quot;: { &quot;type&quot;: &quot;string&quot; }\n    },\n    &quot;summary&quot;: { &quot;type&quot;: &quot;string&quot; }\n  }\n}</code></pre></div>\n<h2 id=\"why-this-second-example-matters\">Why this second example matters</h2>\n<ul><li>it shows what a workspace-specific connector looks like</li><li>it shows a simpler one-capability connector next to a service-family connector</li><li>it makes the <code>Common</code> versus <code>Workspaces</code> split concrete</li><li>it gives workspace developers a pattern they can copy without needing a shared service like Parrot</li></ul>\n<h2 id=\"source-grounding\">Source grounding</h2>\n<p>This example is grounded in the existing Parrot service concept and API described in:</p>\n<ul><li><a href=\"https://docs.google.com/document/d/1Uz-Ep8UqkLuIZzVGzVbvQUor8SBXaWdIhWRxzUjkMgg/edit?usp=sharing\">Project Parrot</a></li></ul>", "searchText": "Connector Example Realistic Parrot-style multi-capability connector example showing how one service can expose several Codex-visible capabilities from one registry folder. Example goal This page now shows two connector patterns: a common shared service connector family using Parrot a workspace-specific connector for a custom capability called brand_sentiment_analysis That combination is closer to how BetaOne should actually look in practice: some skills are cross-workspace services, while others exist only inside one workspace domain. Example folder shape text Copy skills-registry/ Common/ parrot/ service.toml SKILL.md capabilities/ describe_image.toml transcribe_audio.toml describe_video.toml Workspaces/ brand_tracker/ brand_sentiment_analysis/ connector.toml SKILL.md input.schema.json output.schema.json Why this structure works It gives BetaOne and Codex: one root place for the Parrot service identity one shared guidance file describing what Parrot does one capability file per actual callable operation room for different HTTP methods and request shapes per capability It mirrors the direct media capabilities that matter most for Codex-facing usage: POST /v1/image POST /v1/audio POST /v1/video Example service.toml toml Copy name = \"parrot\" title = \"Parrot\" description = \"Multimodal media understanding service that converts image, audio, video, and rich text stimuli into textual outputs usable by agentic runtimes.\" kind = \"service_connector\" base_url_env = \"PARROT_BASE_URL\" client_id_header = \"X-Client-ID\" [service] owner = \"shared-platform\" transport = \"http\" docs = \"Parrot processes media into textual descriptions and transcriptions that BetaOne can reason over.\" Example SKILL.md md Copy # Parrot Parrot is a multimodal service connector family for working with media stimuli. Use Parrot when the interaction needs textual understanding of: - images - audio - video - rich text with embedded media references Parrot is especially useful when: - the same media needs to be processed once and reused many times - downstream reasoning should happen over text rather than raw media - a workspace needs media understanding without embedding that complexity directly into BetaOne Capabilities exposed by this connector family: - `describe_image` - `transcribe_audio` - `describe_video` General guidance: - use the image capability for visual understanding - use the audio capability for spoken content - use the video capability for combined visual and vocal understanding Example capability file: capabilities/describe_image.toml toml Copy name = \"describe_image\" title = \"Describe Image\" description = \"Analyze an image and return textual description, OCR, style, category, size, and extracted elements.\" when_to_use = \"Use for direct image understanding when the interaction needs a textual rendering of visual content.\" constraints = \"Requires an image URL.\" gist_template = \"🖼️ Parsing the image\" [http] method = \"POST\" path = \"/v1/image\" timeout_seconds = 20 [request_mapping] Url = \"$.input.url\" [response_mapping] description = \"$.Description\" ocr = \"$.Ocr\" style = \"$.Style\" category = \"$.Category\" height = \"$.Height\" width = \"$.Width\" elements = \"$.Elements\" Example capability file: capabilities/transcribe_audio.toml toml Copy name = \"transcribe_audio\" title = \"Transcribe Audio\" description = \"Transcribe spoken audio and return transcription, description, language, duration, and extracted elements.\" when_to_use = \"Use when the interaction needs text from vocal audio content.\" constraints = \"Requires an audio URL. Background sounds and music are not described yet.\" gist_template = \"🎧 Parsing the audio\" [http] method = \"POST\" path = \"/v1/audio\" timeout_seconds = 30 [request_mapping] Url = \"$.input.url\" Language = \"$.input.language\" Glossary = \"$.input.glossary\" [response_mapping] transcription = \"$.Transcription\" description = \"$.Description\" language = \"$.TranscriptionLanguage\" duration = \"$.Duration\" elements = \"$.Elements\" Example capability file: capabilities/describe_video.toml toml Copy name = \"describe_video\" title = \"Describe Video\" description = \"Process video by combining visual understanding and audio transcription into a textual summary of the content.\" when_to_use = \"Use when the interaction needs a textual understanding of video content.\" constraints = \"Requires a video URL. Background sounds and music are not described yet.\" gist_template = \"🎥 Parsing the video\" [http] method = \"POST\" path = \"/v1/video\" timeout_seconds = 45 [request_mapping] Url = \"$.input.url\" Language = \"$.input.language\" Glossary = \"$.input.glossary\" [response_mapping] transcription = \"$.Transcription\" language = \"$.TranscriptionLanguage\" description = \"$.Description\" style = \"$.Style\" category = \"$.Category\" duration = \"$.Duration\" height = \"$.Height\" width = \"$.Width\" elements = \"$.Elements\" What this teaches the connector is primarily for Codex awareness a single connector folder can expose a family of related capabilities Gists behavior can be defined per capability HTTP invocation details live alongside the Codex-facing guidance the real backend implementation still lives outside the registry one service like Parrot can expose a small direct capability suite cleanly from one folder Workspace-specific example: brand_sentiment_analysis This second example shows the opposite pattern: not a shared service family, but one workspace-specific connector for a capability that only makes sense inside a particular workspace. Example workspace-specific folder shape text Copy skills-registry/ Workspaces/ brand_tracker/ brand_sentiment_analysis/ connector.toml SKILL.md input.schema.json output.schema.json Example connector.toml toml Copy name = \"brand_sentiment_analysis\" title = \"Brand Sentiment Analysis\" description = \"Analyze textual feedback and estimate brand sentiment, themes, and risk signals for the current workspace.\" when_to_use = \"Use when the interaction needs a sentiment read on brand-related feedback, comments, transcripts, or survey answers.\" constraints = \"Only use inside the brand-tracker workspace. Do not use as a generic sentiment tool when a workspace-specific interpretation is required.\" gist_template = \"📊 Analyzing brand sentiment\" [http] method = \"POST\" url = \"https://brand-tracker.internal/api/v1/brand-sentiment\" timeout_seconds = 20 [request_mapping] brand = \"$.input.brand\" texts = \"$.input.texts\" market = \"$.input.market\" language = \"$.input.language\" [response_mapping] overall_sentiment = \"$.overall_sentiment\" confidence = \"$.confidence\" themes = \"$.themes\" risk_flags = \"$.risk_flags\" summary = \"$.summary\" Example SKILL.md md Copy # Brand Sentiment Analysis Use this skill to analyze how a brand is being perceived in a body of text. Good use cases: - survey open-end responses - interview transcripts - social or community comments - brand campaign reactions Expected output: - overall sentiment - confidence score - major themes - risk flags - concise summary Avoid using this skill when: - the text is not about a brand or branded experience - the workspace needs raw text transformation instead of brand interpretation Example input.schema.json json Copy { \"type\": \"object\", \"required\": [\"brand\", \"texts\"], \"properties\": { \"brand\": { \"type\": \"string\" }, \"texts\": { \"type\": \"array\", \"items\": { \"type\": \"string\" } }, \"market\": { \"type\": \"string\" }, \"language\": { \"type\": \"string\" } } } Example output.schema.json json Copy { \"type\": \"object\", \"required\": [\"overall_sentiment\", \"summary\"], \"properties\": { \"overall_sentiment\": { \"type\": \"string\" }, \"confidence\": { \"type\": \"number\" }, \"themes\": { \"type\": \"array\", \"items\": { \"type\": \"string\" } }, \"risk_flags\": { \"type\": \"array\", \"items\": { \"type\": \"string\" } }, \"summary\": { \"type\": \"string\" } } } Why this second example matters it shows what a workspace-specific connector looks like it shows a simpler one-capability connector next to a service-family connector it makes the Common versus Workspaces split concrete it gives workspace developers a pattern they can copy without needing a shared service like Parrot Source grounding This example is grounded in the existing Parrot service concept and API described in: Project Parrot"}, {"id": "failure-and-fallback-behavior", "title": "Failure and Fallback Behavior", "slug": "failure-and-fallback-behavior", "tab": "integration", "group": "connectors", "order": 40, "summary": "Expected behavior when hooks no-op, skill endpoints fail, or connectors are registered but not eligible.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"no-op-workspace-hooks\">No-op workspace hooks</h2>\n<p>Workspace hooks may legally return identity or no-op outputs at any orchestration phase. The lifecycle must still complete cleanly when this happens.</p>\n<h2 id=\"registered-but-ineligible-skills\">Registered but ineligible skills</h2>\n<p>A connector can be globally registered yet unavailable for a specific invocation because the workspace state disallows it. In that case, Codex should receive explicit restriction instructions and proceed without that capability.</p>\n<h2 id=\"skill-endpoint-failures\">Skill endpoint failures</h2>\n<p>If a skill endpoint fails, BetaOne should convert that into a controlled runtime error path rather than collapsing the entire conversation lifecycle.</p>\n<aside class=\"callout callout-warning\"><div class=\"callout-title\">Controlled degradation</div><div class=\"callout-body\"><p>A skill failure should be visible and actionable, but it should not implicitly erase the conversation context or bypass lifecycle completion.</p></div></aside>\n<h2 id=\"fallback-expectations\">Fallback expectations</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Scenario</th><th>Expected behavior</th></tr></thead><tbody><tr><td>Workspace preflight no-op</td><td>Continue invocation with identity preflight output</td></tr><tr><td>Workspace postflight no-op</td><td>Return final response without transformation</td></tr><tr><td>Skill endpoint failure</td><td>Surface controlled error path and preserve lifecycle integrity</td></tr><tr><td>Skill disallowed by state</td><td>Keep it out of the eligible skill set for that invocation</td></tr></tbody></table></div>\n<h2 id=\"validation-scenarios-carried-into-implementation\">Validation scenarios carried into implementation</h2>\n<ol><li>Happy path with Gists and postflight transform</li><li>No-op hooks at all phases</li><li>State-based restriction on an otherwise registered skill</li><li>Session continuity across separate invocations</li><li>Mixed common and workspace connectors in one conversation</li><li>Connector template for Gists emits progress while skill execution continues</li></ol>", "searchText": "Failure and Fallback Behavior Expected behavior when hooks no-op, skill endpoints fail, or connectors are registered but not eligible. No-op workspace hooks Workspace hooks may legally return identity or no-op outputs at any orchestration phase. The lifecycle must still complete cleanly when this happens. Registered but ineligible skills A connector can be globally registered yet unavailable for a specific invocation because the workspace state disallows it. In that case, Codex should receive explicit restriction instructions and proceed without that capability. Skill endpoint failures If a skill endpoint fails, BetaOne should convert that into a controlled runtime error path rather than collapsing the entire conversation lifecycle. Controlled degradation A skill failure should be visible and actionable, but it should not implicitly erase the conversation context or bypass lifecycle completion. Fallback expectations Scenario Expected behavior Workspace preflight no-op Continue invocation with identity preflight output Workspace postflight no-op Return final response without transformation Skill endpoint failure Surface controlled error path and preserve lifecycle integrity Skill disallowed by state Keep it out of the eligible skill set for that invocation Validation scenarios carried into implementation Happy path with Gists and postflight transform No-op hooks at all phases State-based restriction on an otherwise registered skill Session continuity across separate invocations Mixed common and workspace connectors in one conversation Connector template for Gists emits progress while skill execution continues"}, {"id": "betaone-api", "title": "BetaOne API", "slug": "betaone-api", "tab": "reference", "group": "contracts", "order": 5, "summary": "Public API reference for both BetaOne interaction execution and Prompt-On-Demand (POD).", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"api-model\">API model</h2>\n<p>BetaOne exposes two public internal API modes for workspace developers:</p>\n<ol><li>interaction execution through the Codex runtime</li><li>Prompt-On-Demand (POD) for direct LLM invocation</li></ol>\n<p>The Codex runtime path is interaction-based rather than session-resource-based. BetaOne is invoked for one interaction at a time, while continuity is reconstructed from persisted session artifacts.</p>\n<h2 id=\"primary-endpoint\">Primary endpoint</h2>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">Primary public endpoint</div><div class=\"callout-body\"><p><code>POST /v1/interactions</code></p></div></aside>\n<p>This endpoint accepts one interaction request and returns the execution result through streamed and final outputs.</p>\n<h2 id=\"direct-inference-endpoint\">Direct inference endpoint</h2>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">POD endpoint</div><div class=\"callout-body\"><p><code>POST /v1/pod</code></p></div></aside>\n<p>This endpoint accepts a direct LLM request and returns the model result without going through the Codex session/runtime path.</p>\n<h2 id=\"request-shape\">Request shape</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;workspace_id&quot;: &quot;media_workspace&quot;,\n  &quot;session_id&quot;: &quot;sess_123&quot;,\n  &quot;user_id&quot;: &quot;user_456&quot;,\n  &quot;input&quot;: {\n    &quot;type&quot;: &quot;chat_message&quot;,\n    &quot;content&quot;: &quot;Find the latest highlights and summarize them&quot;\n  },\n  &quot;eligible_skills&quot;: [\n    &quot;search_the_web&quot;,\n    &quot;summarize_results&quot;\n  ],\n  &quot;metadata&quot;: {\n    &quot;locale&quot;: &quot;en-US&quot;\n  },\n  &quot;preflight_output&quot;: {}\n}</code></pre></div>\n<h2 id=\"field-semantics\">Field semantics</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Field</th><th>Meaning</th></tr></thead><tbody><tr><td><code>workspace_id</code></td><td>Which workspace identity, metadata, and skill universe apply</td></tr><tr><td><code>session_id</code></td><td>Which conversation/session continuity to restore</td></tr><tr><td><code>user_id</code></td><td>Which user-level USER/MEMORY files to load</td></tr><tr><td><code>input</code></td><td>Arbitrary JSON payload representing the user&#x27;s current interaction</td></tr><tr><td><code>eligible_skills</code></td><td>The allowed sub-list for this interaction</td></tr><tr><td><code>metadata</code></td><td>Caller-provided context that BetaOne may pass into execution</td></tr><tr><td><code>preflight_output</code></td><td>Optional state-aware enrichment from the caller/workspace orchestration path</td></tr></tbody></table></div>\n<h2 id=\"why-input-stays-generic\">Why <code>input</code> stays generic</h2>\n<p>The input payload should remain flexible. BetaOne relies on Codex reasoning plus the available connectors rather than forcing every caller into one rigid user-input shape.</p>\n<h2 id=\"output-model\">Output model</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Output</th><th>Meaning</th></tr></thead><tbody><tr><td><code>gist</code></td><td>Short progress update emitted during execution</td></tr><tr><td><code>final_output</code></td><td>Final response object for the completed interaction</td></tr></tbody></table></div>\n<h2 id=\"pod-request-shape\">POD request shape</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;model&quot;: &quot;gpt-5-mini&quot;,\n  &quot;system_prompt&quot;: &quot;You are a concise media analyst.&quot;,\n  &quot;user_prompt&quot;: &quot;Classify the sentiment of this brand mention and explain why.&quot;,\n  &quot;tools&quot;: [\n    {\n      &quot;name&quot;: &quot;return_brand_sentiment&quot;,\n      &quot;description&quot;: &quot;Return a normalized brand sentiment classification.&quot;,\n      &quot;input_schema&quot;: {\n        &quot;type&quot;: &quot;object&quot;,\n        &quot;properties&quot;: {\n          &quot;label&quot;: {\n            &quot;type&quot;: &quot;string&quot;\n          },\n          &quot;reason&quot;: {\n            &quot;type&quot;: &quot;string&quot;\n          }\n        },\n        &quot;required&quot;: [&quot;label&quot;, &quot;reason&quot;]\n      }\n    }\n  ],\n  &quot;tool_choice&quot;: &quot;auto&quot;,\n  &quot;response_format&quot;: &quot;json&quot;,\n  &quot;metadata&quot;: {\n    &quot;workspace_id&quot;: &quot;brand_tracker&quot;\n  }\n}</code></pre></div>\n<h2 id=\"pod-field-semantics\">POD field semantics</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Field</th><th>Meaning</th></tr></thead><tbody><tr><td><code>model</code></td><td>BetaOne-facing model identifier to run against</td></tr><tr><td><code>system_prompt</code></td><td>Instruction layer for the vendor call</td></tr><tr><td><code>user_prompt</code></td><td>Caller-provided prompt content</td></tr><tr><td><code>tools</code></td><td>Optional structured function/tool definitions</td></tr><tr><td><code>tool_choice</code></td><td>Optional tool-selection policy such as <code>auto</code> or an explicit tool name</td></tr><tr><td><code>response_format</code></td><td>Expected high-level response mode such as <code>text</code> or <code>json</code></td></tr><tr><td><code>metadata</code></td><td>Optional caller context for tracing, workspace attribution, or policy routing</td></tr></tbody></table></div>\n<h2 id=\"pod-response-shape\">POD response shape</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;model&quot;: &quot;gpt-5-mini&quot;,\n  &quot;vendor&quot;: &quot;openai&quot;,\n  &quot;output_text&quot;: null,\n  &quot;tool_calls&quot;: [\n    {\n      &quot;name&quot;: &quot;return_brand_sentiment&quot;,\n      &quot;arguments&quot;: {\n        &quot;label&quot;: &quot;positive&quot;,\n        &quot;reason&quot;: &quot;The mention emphasizes reliability and ease of use.&quot;\n      }\n    }\n  ],\n  &quot;parsed_output&quot;: {\n    &quot;label&quot;: &quot;positive&quot;,\n    &quot;reason&quot;: &quot;The mention emphasizes reliability and ease of use.&quot;\n  },\n  &quot;usage&quot;: {\n    &quot;input_tokens&quot;: 812,\n    &quot;output_tokens&quot;: 91\n  }\n}</code></pre></div>\n<h2 id=\"why-pod-exists\">Why POD exists</h2>\n<p>POD gives workspace developers a centralized way to reach LLM vendors without handling API keys, provider SDK differences, or parsing utilities inside each skill or service. It is the vendor-abstraction surface for direct inference, while <code>/v1/interactions</code> remains the agentic Codex-runtime surface.</p>\n<h2 id=\"what-betaone-reconstructs-internally\">What BetaOne reconstructs internally</h2>\n<p>The caller should not need to pass all bootstrap artifacts directly. BetaOne reconstructs:</p>\n<ul><li>session <code>jsonl</code></li><li><code>SOUL.md</code></li><li><code>USER.md</code></li><li><code>MEMORY.md</code></li><li>the workspace connector set</li></ul>\n<h2 id=\"currently-open-implementation-details\">Currently open implementation details</h2>\n<ul><li>exact synchronous response shape</li><li>whether Gists transport is SSE, websocket, callback, or another stream channel</li><li>exact structure of <code>final_output</code></li><li>whether <code>metadata</code> and <code>preflight_output</code> stay separate or are merged</li><li>exact model naming catalog exposed through POD</li><li>exact normalization rules when different vendors expose different structured-tool semantics</li></ul>", "searchText": "BetaOne API Public API reference for both BetaOne interaction execution and Prompt-On-Demand (POD). API model BetaOne exposes two public internal API modes for workspace developers: interaction execution through the Codex runtime Prompt-On-Demand (POD) for direct LLM invocation The Codex runtime path is interaction-based rather than session-resource-based. BetaOne is invoked for one interaction at a time, while continuity is reconstructed from persisted session artifacts. Primary endpoint Primary public endpoint POST /v1/interactions This endpoint accepts one interaction request and returns the execution result through streamed and final outputs. Direct inference endpoint POD endpoint POST /v1/pod This endpoint accepts a direct LLM request and returns the model result without going through the Codex session/runtime path. Request shape json Copy { \"workspace_id\": \"media_workspace\", \"session_id\": \"sess_123\", \"user_id\": \"user_456\", \"input\": { \"type\": \"chat_message\", \"content\": \"Find the latest highlights and summarize them\" }, \"eligible_skills\": [ \"search_the_web\", \"summarize_results\" ], \"metadata\": { \"locale\": \"en-US\" }, \"preflight_output\": {} } Field semantics Field Meaning workspace_id Which workspace identity, metadata, and skill universe apply session_id Which conversation/session continuity to restore user_id Which user-level USER/MEMORY files to load input Arbitrary JSON payload representing the user's current interaction eligible_skills The allowed sub-list for this interaction metadata Caller-provided context that BetaOne may pass into execution preflight_output Optional state-aware enrichment from the caller/workspace orchestration path Why input stays generic The input payload should remain flexible. BetaOne relies on Codex reasoning plus the available connectors rather than forcing every caller into one rigid user-input shape. Output model Output Meaning gist Short progress update emitted during execution final_output Final response object for the completed interaction POD request shape json Copy { \"model\": \"gpt-5-mini\", \"system_prompt\": \"You are a concise media analyst.\", \"user_prompt\": \"Classify the sentiment of this brand mention and explain why.\", \"tools\": [ { \"name\": \"return_brand_sentiment\", \"description\": \"Return a normalized brand sentiment classification.\", \"input_schema\": { \"type\": \"object\", \"properties\": { \"label\": { \"type\": \"string\" }, \"reason\": { \"type\": \"string\" } }, \"required\": [\"label\", \"reason\"] } } ], \"tool_choice\": \"auto\", \"response_format\": \"json\", \"metadata\": { \"workspace_id\": \"brand_tracker\" } } POD field semantics Field Meaning model BetaOne-facing model identifier to run against system_prompt Instruction layer for the vendor call user_prompt Caller-provided prompt content tools Optional structured function/tool definitions tool_choice Optional tool-selection policy such as auto or an explicit tool name response_format Expected high-level response mode such as text or json metadata Optional caller context for tracing, workspace attribution, or policy routing POD response shape json Copy { \"model\": \"gpt-5-mini\", \"vendor\": \"openai\", \"output_text\": null, \"tool_calls\": [ { \"name\": \"return_brand_sentiment\", \"arguments\": { \"label\": \"positive\", \"reason\": \"The mention emphasizes reliability and ease of use.\" } } ], \"parsed_output\": { \"label\": \"positive\", \"reason\": \"The mention emphasizes reliability and ease of use.\" }, \"usage\": { \"input_tokens\": 812, \"output_tokens\": 91 } } Why POD exists POD gives workspace developers a centralized way to reach LLM vendors without handling API keys, provider SDK differences, or parsing utilities inside each skill or service. It is the vendor-abstraction surface for direct inference, while /v1/interactions remains the agentic Codex-runtime surface. What BetaOne reconstructs internally The caller should not need to pass all bootstrap artifacts directly. BetaOne reconstructs: session jsonl SOUL.md USER.md MEMORY.md the workspace connector set Currently open implementation details exact synchronous response shape whether Gists transport is SSE, websocket, callback, or another stream channel exact structure of final_output whether metadata and preflight_output stay separate or are merged exact model naming catalog exposed through POD exact normalization rules when different vendors expose different structured-tool semantics"}, {"id": "prompt-on-demand", "title": "Prompt-On-Demand (POD)", "slug": "prompt-on-demand", "tab": "reference", "group": "contracts", "order": 7, "summary": "Direct LLM invocation through BetaOne for workspace developers who need centralized vendor access outside the Codex runtime path.", "audience": "", "status": "Current Spec", "hero": null, "cards": [], "html": "<h2 id=\"what-pod-is\">What POD is</h2>\n<p>Prompt-On-Demand (POD) is BetaOne&#x27;s direct LLM invocation capability. It lets workspace developers run prompts against supported vendors through BetaOne without going through the Codex interaction runtime.</p>\n<p>The point is not to replace the agentic runtime. The point is to centralize the vendor-facing practices that every AI-enabled team would otherwise have to rebuild on its own.</p>\n<h2 id=\"why-pod-exists\">Why POD exists</h2>\n<ul><li>developers should not manage vendor API keys inside every workspace or skill</li><li>developers should not need different SDK logic for OpenAI, Bedrock, or future vendors</li><li>parsing and structured-output conventions should be reusable across teams</li><li>some skills are AI-powered utilities and need direct model access rather than Codex planning</li></ul>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">POD role</div><div class=\"callout-body\"><p>POD is the direct inference surface. <code>/v1/interactions</code> remains the agentic runtime surface.</p></div></aside>\n<h2 id=\"who-should-use-pod\">Who should use POD</h2>\n<p>POD is a public internal BetaOne capability for developers building workspaces. The most common users will be:</p>\n<ul><li>skill authors building AI-powered capabilities behind HTTP</li><li>internal services that need normalized LLM access</li><li>workspace teams that want centralized vendor abstraction without embedding provider logic locally</li></ul>\n<h2 id=\"mental-model\">Mental model</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Mode</th><th>When to use it</th></tr></thead><tbody><tr><td><code>/v1/interactions</code></td><td>You want BetaOne to run the Codex planner/executor with session continuity, connectors, eligibility, and skill invocation</td></tr><tr><td><code>/v1/pod</code></td><td>You already know you need a direct model call and want BetaOne to handle vendor access, request shaping, and response normalization</td></tr></tbody></table></div>\n<h2 id=\"public-endpoint\">Public endpoint</h2>\n<aside class=\"callout callout-contract\"><div class=\"callout-title\">POD endpoint</div><div class=\"callout-body\"><p><code>POST /v1/pod</code></p></div></aside>\n<h2 id=\"request-shape\">Request shape</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;model&quot;: &quot;gpt-5-mini&quot;,\n  &quot;system_prompt&quot;: &quot;You are a concise brand analyst.&quot;,\n  &quot;user_prompt&quot;: &quot;Classify the sentiment of this brand mention and explain why.&quot;,\n  &quot;tools&quot;: [\n    {\n      &quot;name&quot;: &quot;return_brand_sentiment&quot;,\n      &quot;description&quot;: &quot;Return a normalized brand sentiment classification.&quot;,\n      &quot;input_schema&quot;: {\n        &quot;type&quot;: &quot;object&quot;,\n        &quot;properties&quot;: {\n          &quot;label&quot;: {\n            &quot;type&quot;: &quot;string&quot;\n          },\n          &quot;reason&quot;: {\n            &quot;type&quot;: &quot;string&quot;\n          }\n        },\n        &quot;required&quot;: [&quot;label&quot;, &quot;reason&quot;]\n      }\n    }\n  ],\n  &quot;tool_choice&quot;: &quot;auto&quot;,\n  &quot;response_format&quot;: &quot;json&quot;,\n  &quot;metadata&quot;: {\n    &quot;workspace_id&quot;: &quot;brand_tracker&quot;,\n    &quot;caller&quot;: &quot;brand_sentiment_analysis&quot;\n  }\n}</code></pre></div>\n<h2 id=\"request-field-semantics\">Request field semantics</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Field</th><th>Meaning</th></tr></thead><tbody><tr><td><code>model</code></td><td>BetaOne-facing model identifier</td></tr><tr><td><code>system_prompt</code></td><td>System-level instruction layer</td></tr><tr><td><code>user_prompt</code></td><td>Primary caller prompt</td></tr><tr><td><code>tools</code></td><td>Optional structured function/tool definitions</td></tr><tr><td><code>tool_choice</code></td><td>Optional policy for whether a tool may or must be used</td></tr><tr><td><code>response_format</code></td><td>Expected high-level output mode such as <code>text</code> or <code>json</code></td></tr><tr><td><code>metadata</code></td><td>Optional tracing, workspace, or policy-routing context</td></tr></tbody></table></div>\n<h2 id=\"response-shape\">Response shape</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;model&quot;: &quot;gpt-5-mini&quot;,\n  &quot;vendor&quot;: &quot;openai&quot;,\n  &quot;output_text&quot;: null,\n  &quot;tool_calls&quot;: [\n    {\n      &quot;name&quot;: &quot;return_brand_sentiment&quot;,\n      &quot;arguments&quot;: {\n        &quot;label&quot;: &quot;positive&quot;,\n        &quot;reason&quot;: &quot;The mention emphasizes reliability and ease of use.&quot;\n      }\n    }\n  ],\n  &quot;parsed_output&quot;: {\n    &quot;label&quot;: &quot;positive&quot;,\n    &quot;reason&quot;: &quot;The mention emphasizes reliability and ease of use.&quot;\n  },\n  &quot;usage&quot;: {\n    &quot;input_tokens&quot;: 812,\n    &quot;output_tokens&quot;: 91\n  }\n}</code></pre></div>\n<h2 id=\"what-betaone-abstracts-away\">What BetaOne abstracts away</h2>\n<ul><li>vendor credentials and key management</li><li>provider SDK differences</li><li>request/response normalization</li><li>structured tool-call parsing</li><li>future provider expansion behind one internal API</li></ul>\n<h2 id=\"relationship-to-skills\">Relationship to skills</h2>\n<p>POD is especially useful inside skill implementations. A workspace team can build a skill behind HTTP, call POD from that implementation, and keep all vendor-specific model access centralized in BetaOne rather than spreading it across workspace codebases.</p>\n<h2 id=\"non-goals\">Non-goals</h2>\n<ul><li>POD does not replace the Codex interaction runtime</li><li>POD does not manage workspace automata, eligibility, or session continuity</li><li>POD should not be described as &quot;just another skill&quot;; it is a BetaOne-native capability surface</li></ul>", "searchText": "Prompt-On-Demand (POD) Direct LLM invocation through BetaOne for workspace developers who need centralized vendor access outside the Codex runtime path. What POD is Prompt-On-Demand (POD) is BetaOne's direct LLM invocation capability. It lets workspace developers run prompts against supported vendors through BetaOne without going through the Codex interaction runtime. The point is not to replace the agentic runtime. The point is to centralize the vendor-facing practices that every AI-enabled team would otherwise have to rebuild on its own. Why POD exists developers should not manage vendor API keys inside every workspace or skill developers should not need different SDK logic for OpenAI, Bedrock, or future vendors parsing and structured-output conventions should be reusable across teams some skills are AI-powered utilities and need direct model access rather than Codex planning POD role POD is the direct inference surface. /v1/interactions remains the agentic runtime surface. Who should use POD POD is a public internal BetaOne capability for developers building workspaces. The most common users will be: skill authors building AI-powered capabilities behind HTTP internal services that need normalized LLM access workspace teams that want centralized vendor abstraction without embedding provider logic locally Mental model Mode When to use it /v1/interactions You want BetaOne to run the Codex planner/executor with session continuity, connectors, eligibility, and skill invocation /v1/pod You already know you need a direct model call and want BetaOne to handle vendor access, request shaping, and response normalization Public endpoint POD endpoint POST /v1/pod Request shape json Copy { \"model\": \"gpt-5-mini\", \"system_prompt\": \"You are a concise brand analyst.\", \"user_prompt\": \"Classify the sentiment of this brand mention and explain why.\", \"tools\": [ { \"name\": \"return_brand_sentiment\", \"description\": \"Return a normalized brand sentiment classification.\", \"input_schema\": { \"type\": \"object\", \"properties\": { \"label\": { \"type\": \"string\" }, \"reason\": { \"type\": \"string\" } }, \"required\": [\"label\", \"reason\"] } } ], \"tool_choice\": \"auto\", \"response_format\": \"json\", \"metadata\": { \"workspace_id\": \"brand_tracker\", \"caller\": \"brand_sentiment_analysis\" } } Request field semantics Field Meaning model BetaOne-facing model identifier system_prompt System-level instruction layer user_prompt Primary caller prompt tools Optional structured function/tool definitions tool_choice Optional policy for whether a tool may or must be used response_format Expected high-level output mode such as text or json metadata Optional tracing, workspace, or policy-routing context Response shape json Copy { \"model\": \"gpt-5-mini\", \"vendor\": \"openai\", \"output_text\": null, \"tool_calls\": [ { \"name\": \"return_brand_sentiment\", \"arguments\": { \"label\": \"positive\", \"reason\": \"The mention emphasizes reliability and ease of use.\" } } ], \"parsed_output\": { \"label\": \"positive\", \"reason\": \"The mention emphasizes reliability and ease of use.\" }, \"usage\": { \"input_tokens\": 812, \"output_tokens\": 91 } } What BetaOne abstracts away vendor credentials and key management provider SDK differences request/response normalization structured tool-call parsing future provider expansion behind one internal API Relationship to skills POD is especially useful inside skill implementations. A workspace team can build a skill behind HTTP, call POD from that implementation, and keep all vendor-specific model access centralized in BetaOne rather than spreading it across workspace codebases. Non-goals POD does not replace the Codex interaction runtime POD does not manage workspace automata, eligibility, or session continuity POD should not be described as \"just another skill\"; it is a BetaOne-native capability surface"}, {"id": "contracts-reference", "title": "Contracts Reference", "slug": "contracts-reference", "tab": "reference", "group": "contracts", "order": 10, "summary": "Reference view of the conceptual contracts and endpoint inventory used throughout the current BetaOne baseline.", "audience": "", "status": "Reference", "hero": null, "cards": [], "html": "<h2 id=\"interface-inventory\">Interface inventory</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Interface</th><th>Direction</th><th>Purpose</th></tr></thead><tbody><tr><td>Workspace pre-flight hook</td><td>Caller -&gt; Workspace</td><td>Gather state-aware pre-flight output and eligible skills</td></tr><tr><td>Workspace post-flight hook</td><td>Caller -&gt; Workspace</td><td>Let the workspace transform, enrich, or accept the final result after BetaOne execution</td></tr><tr><td>Interaction invocation</td><td>Caller -&gt; BetaOne</td><td>Run one interaction in session/workspace/user context</td></tr><tr><td>Prompt-On-Demand (POD)</td><td>Caller -&gt; BetaOne</td><td>Run direct LLM inference through BetaOne&#x27;s vendor abstraction layer</td></tr><tr><td>Metadata endpoint</td><td>BetaOne -&gt; Workspace</td><td>Fetch <code>SOUL.md</code> and workspace connector metadata</td></tr><tr><td>Connector call</td><td>BetaOne -&gt; Skill endpoint</td><td>Execute a normalized capability</td></tr><tr><td>Runtime outputs</td><td>BetaOne -&gt; Caller</td><td>Emit <code>gist</code> and <code>final_output</code> events</td></tr><tr><td>Session persistence</td><td>BetaOne -&gt; Persistent store</td><td>Restore and persist session jsonl snapshots plus memory files</td></tr></tbody></table></div>\n<h2 id=\"workspace-pre-flight-envelope\">Workspace pre-flight envelope</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;session_id&quot;: &quot;sess_123&quot;,\n  &quot;workspace_id&quot;: &quot;media_workspace&quot;,\n  &quot;user_id&quot;: &quot;user_456&quot;,\n  &quot;input&quot;: {},\n  &quot;metadata&quot;: {}\n}</code></pre></div>\n<h2 id=\"workspace-post-flight-envelope\">Workspace post-flight envelope</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;session_id&quot;: &quot;sess_123&quot;,\n  &quot;workspace_id&quot;: &quot;media_workspace&quot;,\n  &quot;user_id&quot;: &quot;user_456&quot;,\n  &quot;final_output&quot;: {},\n  &quot;metadata&quot;: {}\n}</code></pre></div>\n<h2 id=\"interaction-invocation-envelope\">Interaction invocation envelope</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;workspace_id&quot;: &quot;media_workspace&quot;,\n  &quot;session_id&quot;: &quot;sess_123&quot;,\n  &quot;user_id&quot;: &quot;user_456&quot;,\n  &quot;input&quot;: {},\n  &quot;preflight_output&quot;: {},\n  &quot;eligible_skills&quot;: []\n}</code></pre></div>\n<h2 id=\"pod-envelope\">POD envelope</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;model&quot;: &quot;gpt-5-mini&quot;,\n  &quot;system_prompt&quot;: &quot;You are a concise analyst.&quot;,\n  &quot;user_prompt&quot;: &quot;Summarize the sentiment of this mention.&quot;,\n  &quot;tools&quot;: [],\n  &quot;response_format&quot;: &quot;json&quot;,\n  &quot;metadata&quot;: {\n    &quot;workspace_id&quot;: &quot;brand_tracker&quot;\n  }\n}</code></pre></div>\n<h2 id=\"connector-call-envelope\">Connector call envelope</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;capability&quot;: &quot;search_video_catalog&quot;,\n  &quot;input&quot;: {},\n  &quot;context&quot;: {\n    &quot;workspace_id&quot;: &quot;media_workspace&quot;,\n    &quot;session_id&quot;: &quot;sess_123&quot;,\n    &quot;user_id&quot;: &quot;user_456&quot;\n  }\n}</code></pre></div>\n<h2 id=\"mid-flight-runtime-outputs\">Mid-flight runtime outputs</h2>\n<p>Mid-flight is BetaOne execution-time behavior. The caller can receive Gists while BetaOne is invoking skills.</p>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">json</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;type&quot;: &quot;gist&quot;,\n  &quot;session_id&quot;: &quot;sess_123&quot;,\n  &quot;capability&quot;: &quot;describe_video&quot;,\n  &quot;message&quot;: &quot;🎥 Parsing the video&quot;\n}</code></pre></div>\n<h2 id=\"event-outputs\">Event outputs</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Event</th><th>Required meaning</th></tr></thead><tbody><tr><td><code>gist</code></td><td>Midflight update intended for immediate upstream consumption</td></tr><tr><td><code>final_output</code></td><td>Invocation completion payload returned to the caller</td></tr></tbody></table></div>\n<h2 id=\"notes\">Notes</h2>\n<ul><li>These shapes are conceptual contracts for architecture alignment.</li><li>Pre-flight and post-flight belong to the caller/workspace orchestration path.</li><li>Mid-flight belongs to BetaOne execution and is expressed through runtime outputs such as <code>gist</code>.</li><li>POD is a direct inference path and does not use the interaction lifecycle hooks or Codex session reconstruction.</li><li>Transport and field expansion can evolve later as long as the lifecycle semantics remain intact.</li></ul>", "searchText": "Contracts Reference Reference view of the conceptual contracts and endpoint inventory used throughout the current BetaOne baseline. Interface inventory Interface Direction Purpose Workspace pre-flight hook Caller -> Workspace Gather state-aware pre-flight output and eligible skills Workspace post-flight hook Caller -> Workspace Let the workspace transform, enrich, or accept the final result after BetaOne execution Interaction invocation Caller -> BetaOne Run one interaction in session/workspace/user context Prompt-On-Demand (POD) Caller -> BetaOne Run direct LLM inference through BetaOne's vendor abstraction layer Metadata endpoint BetaOne -> Workspace Fetch SOUL.md and workspace connector metadata Connector call BetaOne -> Skill endpoint Execute a normalized capability Runtime outputs BetaOne -> Caller Emit gist and final_output events Session persistence BetaOne -> Persistent store Restore and persist session jsonl snapshots plus memory files Workspace pre-flight envelope json Copy { \"session_id\": \"sess_123\", \"workspace_id\": \"media_workspace\", \"user_id\": \"user_456\", \"input\": {}, \"metadata\": {} } Workspace post-flight envelope json Copy { \"session_id\": \"sess_123\", \"workspace_id\": \"media_workspace\", \"user_id\": \"user_456\", \"final_output\": {}, \"metadata\": {} } Interaction invocation envelope json Copy { \"workspace_id\": \"media_workspace\", \"session_id\": \"sess_123\", \"user_id\": \"user_456\", \"input\": {}, \"preflight_output\": {}, \"eligible_skills\": [] } POD envelope json Copy { \"model\": \"gpt-5-mini\", \"system_prompt\": \"You are a concise analyst.\", \"user_prompt\": \"Summarize the sentiment of this mention.\", \"tools\": [], \"response_format\": \"json\", \"metadata\": { \"workspace_id\": \"brand_tracker\" } } Connector call envelope json Copy { \"capability\": \"search_video_catalog\", \"input\": {}, \"context\": { \"workspace_id\": \"media_workspace\", \"session_id\": \"sess_123\", \"user_id\": \"user_456\" } } Mid-flight runtime outputs Mid-flight is BetaOne execution-time behavior. The caller can receive Gists while BetaOne is invoking skills. json Copy { \"type\": \"gist\", \"session_id\": \"sess_123\", \"capability\": \"describe_video\", \"message\": \"🎥 Parsing the video\" } Event outputs Event Required meaning gist Midflight update intended for immediate upstream consumption final_output Invocation completion payload returned to the caller Notes These shapes are conceptual contracts for architecture alignment. Pre-flight and post-flight belong to the caller/workspace orchestration path. Mid-flight belongs to BetaOne execution and is expressed through runtime outputs such as gist . POD is a direct inference path and does not use the interaction lifecycle hooks or Codex session reconstruction. Transport and field expansion can evolve later as long as the lifecycle semantics remain intact."}, {"id": "user-and-memory-files", "title": "User and Memory Files", "slug": "user-and-memory-files", "tab": "reference", "group": "memory", "order": 10, "summary": "How `USER.md` and `MEMORY.md` work, what each one stores, and how BetaOne updates them without blocking the user interaction.", "audience": "", "status": "Current Guide", "hero": null, "cards": [], "html": "<h2 id=\"file-ownership\">File ownership</h2>\n<ul><li><code>SOUL.md</code> is owned by the workspace</li><li><code>USER.md</code> is owned by BetaOne</li><li><code>MEMORY.md</code> is owned by BetaOne</li></ul>\n<h2 id=\"default-allocation\">Default allocation</h2>\n<p>Each new user starts from boilerplate default templates for <code>USER.md</code> and <code>MEMORY.md</code>. Those defaults are stored in the BetaOne repository and materialized when the user is first seen.</p>\n<h2 id=\"recommended-split\">Recommended split</h2>\n<h3 id=\"user-md\">USER.md</h3>\n<p>Use this for durable user preference and interaction profile:</p>\n<ul><li>what to call the user</li><li>timezone</li><li>style and tone preferences</li><li>standing behavioral requests</li><li>long-lived context that affects how the system should help</li></ul>\n<h3 id=\"memory-md\">MEMORY.md</h3>\n<p>Use this for remembered facts and continuity:</p>\n<ul><li>facts explicitly requested to be remembered</li><li>recent context worth carrying across sessions</li><li>project continuity notes</li><li>casual but useful long-term memory</li></ul>\n<h2 id=\"example-user-md-starter\">Example USER.md starter</h2>\n<div class=\"code-shell\"><div class=\"code-toolbar\"><div class=\"code-meta\">md</div><button class=\"copy-button\" type=\"button\">Copy</button></div><pre><code class=\"language-md\"># USER\n\nLearn about the person you&#x27;re helping. Update this as you go.\n\nName:\nWhat to call them:\nPronouns: (optional)\nTimezone:\n\n## Notes\n\n## Context</code></pre></div>\n<h2 id=\"update-strategy\">Update strategy</h2>\n<p>BetaOne should not block the user response while deciding how to update these files.</p>\n<ol><li>finish the interaction</li><li>queue an async memory-update job</li><li>let a side process evaluate whether <code>USER.md</code> and/or <code>MEMORY.md</code> should change</li></ol>\n<h2 id=\"update-triggers\">Update triggers</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Trigger</th><th>Likely target</th></tr></thead><tbody><tr><td>&quot;Speak to me more casually&quot;</td><td><code>USER.md</code></td></tr><tr><td>&quot;Remember that my team demo is on Thursday&quot;</td><td><code>MEMORY.md</code></td></tr><tr><td>Strong recurring user preference inferred over time</td><td><code>USER.md</code></td></tr><tr><td>Useful continuity from the latest interaction</td><td><code>MEMORY.md</code></td></tr></tbody></table></div>", "searchText": "User and Memory Files How `USER.md` and `MEMORY.md` work, what each one stores, and how BetaOne updates them without blocking the user interaction. File ownership SOUL.md is owned by the workspace USER.md is owned by BetaOne MEMORY.md is owned by BetaOne Default allocation Each new user starts from boilerplate default templates for USER.md and MEMORY.md . Those defaults are stored in the BetaOne repository and materialized when the user is first seen. Recommended split USER.md Use this for durable user preference and interaction profile: what to call the user timezone style and tone preferences standing behavioral requests long-lived context that affects how the system should help MEMORY.md Use this for remembered facts and continuity: facts explicitly requested to be remembered recent context worth carrying across sessions project continuity notes casual but useful long-term memory Example USER.md starter md Copy # USER Learn about the person you're helping. Update this as you go. Name: What to call them: Pronouns: (optional) Timezone: ## Notes ## Context Update strategy BetaOne should not block the user response while deciding how to update these files. finish the interaction queue an async memory-update job let a side process evaluate whether USER.md and/or MEMORY.md should change Update triggers Trigger Likely target \"Speak to me more casually\" USER.md \"Remember that my team demo is on Thursday\" MEMORY.md Strong recurring user preference inferred over time USER.md Useful continuity from the latest interaction MEMORY.md"}, {"id": "glossary", "title": "Glossary", "slug": "glossary", "tab": "reference", "group": "vocabulary", "order": 20, "summary": "Working vocabulary for the BetaOne baseline.", "audience": "", "status": "Reference", "hero": null, "cards": [], "html": "<h2 id=\"terms\">Terms</h2>\n<div class=\"table-shell\"><table><thead><tr><th>Term</th><th>Working definition</th></tr></thead><tbody><tr><td>🔥🪨 Firestone</td><td>Conversation orchestration layer that owns lifecycle metadata and user-facing event flow</td></tr><tr><td>🅱️1️⃣ BetaOne</td><td>Standalone agentic runtime that reconstructs interaction context, runs Codex, and persists continuity</td></tr><tr><td>✨ POD</td><td>BetaOne&#x27;s direct LLM invocation surface for workspace developers who need vendor-backed inference without using the Codex runtime path</td></tr><tr><td>🧩 Workspace</td><td>A conversational AI project with its own identity, state, metadata, and hidden skill implementations</td></tr><tr><td>🔌 Connector</td><td>The capability contract visible to Codex through the registry</td></tr><tr><td>🛠️ Skill implementation</td><td>The actual backend capability behind a connector, usually exposed over HTTP</td></tr><tr><td>🗂️ Skills Registry</td><td>The organized store of connector definitions and metadata</td></tr><tr><td>📡 Gists</td><td>Short user-facing progress summaries emitted by BetaOne during execution, often from connector metadata</td></tr><tr><td>🎛️ State</td><td>Workspace-owned condition used to constrain behavior and skill eligibility</td></tr><tr><td>📜 Session jsonl snapshot</td><td>Persisted runtime transcript used to reconstruct continuity on the next invocation</td></tr><tr><td>🧬 <code>SOUL.md</code></td><td>Workspace-owned file describing identity, intended behavior, and guardrails</td></tr><tr><td>👤 <code>USER.md</code></td><td>BetaOne-owned user preference and interaction profile file</td></tr><tr><td>💾 <code>MEMORY.md</code></td><td>BetaOne-owned remembered-context and continuity file</td></tr></tbody></table></div>\n<h2 id=\"interpretation-guidance\">Interpretation guidance</h2>\n<p>These definitions are intentionally pragmatic. They exist to keep architecture discussions precise without prematurely freezing terminology that may expand later.</p>", "searchText": "Glossary Working vocabulary for the BetaOne baseline. Terms Term Working definition 🔥🪨 Firestone Conversation orchestration layer that owns lifecycle metadata and user-facing event flow 🅱️1️⃣ BetaOne Standalone agentic runtime that reconstructs interaction context, runs Codex, and persists continuity ✨ POD BetaOne's direct LLM invocation surface for workspace developers who need vendor-backed inference without using the Codex runtime path 🧩 Workspace A conversational AI project with its own identity, state, metadata, and hidden skill implementations 🔌 Connector The capability contract visible to Codex through the registry 🛠️ Skill implementation The actual backend capability behind a connector, usually exposed over HTTP 🗂️ Skills Registry The organized store of connector definitions and metadata 📡 Gists Short user-facing progress summaries emitted by BetaOne during execution, often from connector metadata 🎛️ State Workspace-owned condition used to constrain behavior and skill eligibility 📜 Session jsonl snapshot Persisted runtime transcript used to reconstruct continuity on the next invocation 🧬 SOUL.md Workspace-owned file describing identity, intended behavior, and guardrails 👤 USER.md BetaOne-owned user preference and interaction profile file 💾 MEMORY.md BetaOne-owned remembered-context and continuity file Interpretation guidance These definitions are intentionally pragmatic. They exist to keep architecture discussions precise without prematurely freezing terminology that may expand later."}, {"id": "architecture-decisions", "title": "Architecture Decisions", "slug": "architecture-decisions", "tab": "reference", "group": "decisions", "order": 30, "summary": "Baseline decisions to approve now, plus the immediate milestones and open follow-ups for the current BetaOne runtime architecture.", "audience": "", "status": "Current Decisions", "hero": null, "cards": [], "html": "<h2 id=\"baseline-decisions-to-approve\">Baseline decisions to approve</h2>\n<ol><li>BetaOne is a standalone runtime, not only a Firestone-internal component.</li><li>Firestone is the main current lifecycle orchestrator above BetaOne.</li><li>BetaOne owns runtime assembly, Codex execution, skill invocation, Gists streaming, and session reconstruction.</li><li>Workspaces own <code>SOUL.md</code>, automata/state, hidden i
